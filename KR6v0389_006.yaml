body:
  text: 方伎僧玄奘神秀慧能普寂義福附一行泓師附僧玄奘姓陳氏洛州偃師人大業末出家博涉經論嘗謂翻譯者多有訛謬故就西域廣求異本以參驗之貞觀初隨商人往遊西域玄奘既辨博出羣所在必為講釋論難蕃人遠近咸尊伏之在西域十七年經百餘國悉解其國之語仍採其山川謠俗土地所有撰西域記十二卷貞觀十九年歸至京師太宗見之大悅與之談論於是詔將梵本六百五十七部於弘福寺翻譯仍敕右僕射房玄齡太子左庶子許敬宗廣召碩學沙門五十餘人相助整比高宗在東宮為文德太后追福造慈恩寺及翻經院內出大幡敕九部樂及京城諸寺幡蓋衆伎送玄奘及所翻經像諸高僧等入住慈恩寺顯慶元年高宗又令左僕射于志寧侍中許敬宗中書令來濟李義府杜正倫黃門侍郎薛元超等共潤色玄奘所定之經國子博士范義碩太子洗馬郭瑜弘文館學士高若思等助加翻譯凡成七十五部奏上之後以京城人衆競來禮謁玄奘乃奏請逐靜翻譯敕乃移於宜君山故玉華宮六年卒時年五十六歸葬於白鹿原士女送葬者數萬人僧神秀姓李氏汴州尉氏人少遍覽經史隋末出家為僧後遇蘄州雙峯山東山寺僧弘忍以坐禪為業乃歎伏曰此真吾師也便往事弘忍專以樵汲自役以求其道昔後魏末有僧達摩者本天竺王子以護國出家入南海得禪宗妙法云自釋迦相傳有衣鉢為記世相付授達摩齎衣鉢航海而來至梁詣武帝帝問以有為之事達摩不説乃之魏隱於嵩山少林寺遇毒而卒其年魏使宋雲於蔥嶺回見之門徒發其墓但有衣履而已達摩傳慧可慧可嘗斷其左臂以求其法慧可傳璨璨傳道信道信傳弘忍弘忍姓周氏黃梅人初弘忍與道信並住東山寺故謂其法為東山法門神秀既師事弘忍弘忍深器異之謂曰吾度人多矣至於懸解圓照無先汝者弘忍以咸亨五年卒神秀乃往荊州居於當陽山則天聞其名追赴都肩輿上殿親加跪禮敕當陽山置度門寺以旌其德時王公已下及京都士庶聞風爭來謁見望塵拜伏日以萬數中宗即位尤加敬異中書舍人張説嘗問道執弟子之禮退謂人曰禪師身長八尺龐眉秀耳威德巍巍王霸之器也初神秀同學僧慧能者新州人也與神秀行業相埒弘忍卒後慧能住韶州廣果寺韶州山中舊多虎豹一朝盡去遠近驚歎咸歸伏焉神秀嘗奏則天請追慧能赴都慧能固辭神秀又自作書重邀之慧能謂使者曰吾形貌矬陋北土見之恐不敬吾法又先師以吾南中有緣亦不可違也竟不度嶺而死天下乃散傳其道謂神秀為北宗慧能為南宗神秀以神龍二年卒士庶皆來送葬有詔賜諡曰大通禪師又於相王舊宅置報恩寺岐王範張説及徵士盧鴻一皆為其碑文神秀卒後弟子普寂義福並為時人所重普寂姓馮氏蒲州河東人也年少時遍尋高僧以學經律時神秀在荊州玉泉寺普寂乃往師事凡六年神秀奇之盡以其道授焉久視中則天召神秀至東都神秀因薦普寂乃度為僧及神秀卒天下好釋氏者咸師事之中宗聞其高年特下制令普寂代神秀統其法衆開元十三年敕普寂於都城居止時王公士庶競來禮謁普寂嚴重少言來者難見其和悅之容遠近尤以此重之二十七年終于都城興唐寺年八十九時都城士庶曾謁者皆制弟子之服有制賜號為大照禪師及葬河南尹裴寬及其妻子並衰麻列于門徒之次士庶傾城哭送閭里為之空焉義福姓薑氏潞州銅鞮人初止藍田化感寺處方丈之室凡二十餘年未嘗出宇之外後隸京城慈恩寺開元十一年從駕往東都途經蒲虢二州刺史及官吏士女皆齎幡花迎之所在途路充塞以二十年卒有制賜號大智禪師葬於伊闕之北送葬者數萬人中書侍郎嚴挺之為製碑文神秀禪門之傑雖有禪行得帝王重之而未嘗聚徒開堂傳法至弟子普寂始於都城傳教二十餘年人皆仰之僧一行姓張氏先名遂魏州昌樂人襄州都督郯國公公謹之孫也父擅武功令一行少聰敏博覽經史尤精曆象陰陽五行之學時道士尹崇博學先達素多墳籍一行詣崇借揚雄太玄經將歸讀之數日復詣崇還其書崇曰此書意指稍深吾尋之積年尚不能曉吾子試更研求何遽見還也一行曰究其義矣因出所撰大衍玄圖及義決一卷以示崇崇大驚因與一行談其奧賾甚嗟伏之謂人曰此後生顏子也一行由是大知名武三思慕其學行就請與結交一行逃匿以避之尋出家為僧隱於嵩山師事沙門普寂睿宗即位敕東都留守韋安石以禮徵一行固辭以疾不應命後步往荊州當陽山依沙門悟真以習梵律開元五年玄宗令其族叔禮部郎中洽齎敕書就荊州強起之一行至京置於光太殿數就之訪以安國撫人之道言皆切直無有所隱開元十年永穆公主出降敕有司優厚發遣依太平公主故事一行以為高宗末年唯有一女所以特加其禮又太平驕僭竟以得罪不應引以為例上納其言遽追敕不行但依常禮其諫諍皆此類也一行尤明著述撰大衍論三卷攝調伏藏十卷天一太一經及太一局遁甲經釋氏系録各一卷時麟德曆經推步漸疏敕一行考前代諸家曆法改撰新曆又令率府長史梁令瓚等與工人創造黃道遊儀以考七曜行度互相證明於是一行推周易大衍之數立衍以應之改撰開元大衍曆經至十五年卒年四十五賜諡曰大慧禪師初一行從祖東臺舍人太素撰後魏書一百卷其天文志未成一行續而成之上為一行製碑文親書於石出內庫錢五十萬為起塔於銅人之原明年幸溫湯過其塔前又駐騎徘徊令品官就塔以告其出豫之意更賜絹五十匹以蒔塔前松柏焉初一行求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布算聲而謂其徒曰今日當有弟子自遠求吾算法已合到門豈無人導達也即除一算又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡受其術焉而門前水果却西流道士邢和璞嘗謂尹愔曰一行其聖人乎漢之洛下閎造曆云後八百歲當差一日必有聖人正之今年期畢矣而一行造大衍正其差謬則洛下閎之言信矣非聖人而何時又有黃州僧泓者善葬法每行視山原即為之圖張説深信重之
