body:
  text: 藝術傳佛圖澄佛圖澄天竺人也本姓帛氏少學道妙通玄術永嘉四年來適洛陽自云百有餘歲常服氣自養能積日不食善誦神呪能役使鬼神腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照于一室又嘗齊時平旦至流水側從腹旁孔中引出五藏六府洗之訖還內腹中又能聽鈴音以言吉凶莫不懸驗及洛中寇亂乃潛草野以觀變石勒屯兵葛陂專行殺戮沙門遇害者甚衆澄投勒大將軍郭黑略家黑略每從勒征伐輒豫克勝負勒疑而問曰孤不覺卿有出衆智謀而每知軍行吉凶何也黑略曰將軍天挺神武幽靈所助有一沙門智術非常云將軍當略有區夏己應為師臣前後所白皆其言也勒召澄試以道術澄即取鉢盛水燒香呪之須臾鉢中生青蓮花光色曜日勒由此信之勒自葛陂還河北過枋頭枋頭人夜欲斫營澄謂黑略曰須臾賊至可令公知果如其言有備故不敗勒欲試澄夜冠胄衣甲執刀而坐遣人告澄云夜來不知大將軍何所在使人始至未及有言澄逆問曰平居無寇何故夜嚴勒益信之勒後因忿欲害諸道士并欲苦澄澄乃潛避至黑略舍語弟子曰若將軍信至問吾所在者報云不知所之既而勒使至覓澄不得使還報勒勒驚曰吾有惡意向澄澄捨我去矣通夜不寢思欲見澄澄知勒意悔明旦造勒勒曰昨夜何行澄曰公有怒心昨故權避公今改意是以敢來勒大笑曰道人謬矣襄國城塹水源在城西北五里其水源暴竭勒問澄何以致水澄曰今當敕龍取水乃與弟子法首等數人至故泉源上坐繩牀燒安息香呪願數百言如此三日水泫然微流有一小龍長五六寸許隨水而來諸道士競往視之有頃水大至隍塹皆滿鮮卑段末波攻勒衆甚盛勒懼問澄澄曰昨日寺鈴鳴云明旦食時當擒段末波勒登城望末波軍不見前後失色曰末波如此豈可獲乎更遣夔安問澄澄曰已獲末波矣時城北伏兵出遇末波執之澄勸勒宥末波遣還本國勒從之卒獲其用劉曜遣從弟嶽攻勒勒遣石季龍距之嶽敗退保石梁塢季龍堅柵守之澄在襄國忽歎曰劉嶽可憫弟子法祚問其故澄曰昨日亥時嶽已敗被執果如所言及曜自攻洛陽勒將救之其羣下咸諫以為不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬禿當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬禿當捉也此言軍出捉得曜也又令一童子潔齊七日取麻油合胭脂躬自研於掌中舉手示童子粲然有輝童子驚曰有軍馬甚衆見一人長大白皙以朱絲縛其肘澄曰此即曜也勒甚悅遂赴洛距曜生擒之勒僭稱趙天王行皇帝事敬澄彌篤時石蔥將叛澄誡勒曰今年蔥中有蟲食必害人可令百姓無食蔥也勒班告境內慎無食蔥俄而石蔥果走勒益重之事必咨而後行號曰大和尚勒愛子斌暴病死將殯勒歎曰朕聞虢太子死扁鵲能生之今可得效乎乃令告澄澄取楊枝沾水灑而呪之就執斌手曰可起矣因此遂蘇有頃平復自是勒諸子多在澄寺中養之勒死之年天靜無風而塔上一鈴獨鳴澄謂衆曰鈴音云國有大喪不出今年矣既而勒果死及季龍僭位遷都於鄴傾心事澄有重於勒下書衣澄以綾錦乘以雕輦朝會之日引之升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚衆坐皆起以彰其尊又使司空李農旦夕親問其太子諸公五日一朝尊敬莫與為比支道林在京師聞澄與諸石遊乃曰澄公其以季龍為海鷗鳥也百姓因澄故多奉佛皆營造寺廟相競出家真僞混淆多生愆過季龍下書料簡其著作郎王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道惟聽西域人得立寺都邑以奉其神漢人皆不出家魏承漢制亦循前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典禮其百辟卿士下逮衆隸例皆禁之其有犯者與淫祀同罪其趙人為沙門者還服百姓朝士多同度所奏季龍以澄故下書曰朕出自邊戎忝君諸夏至於饗祀應從本俗佛是戎神所應兼奉其夷趙百姓有樂事佛者特聽之澄時止鄴城寺中弟子遍於郡國嘗遣弟子法常北至襄國弟子法佐從襄國還相遇於梁基城下對車夜談言及和尚比旦各去佐始入澄逆笑曰昨夜爾與法常交車共說汝師邪佐愕然愧懺於是國人每相語莫起惡心和尚知汝及澄之所在無敢向其方面涕唾者季龍太子邃有二子在襄國澄語邃曰小阿彌比當得疾可往看之邃即馳信往視果已得疾太醫殷騰及外國道士自言能療之澄告弟子法牙曰正使聖人復出不愈此疾況此等乎後三日果死邃將圖為逆謂內豎曰和尚神通儻發吾謀明日來者當先除之澄月望將入覲季龍謂弟子僧慧曰昨夜天神呼我曰明日若入還勿過人我儻有所過汝當止我澄常入必過邃邃知澄入要候甚苦澄將上南臺僧慧引衣澄曰事不得止坐未安便起邃固留不住所謀遂差還寺歎曰太子作亂其形將成欲言難言欲忍難忍乃因事從容針季龍季龍終不能解俄而事發方悟澄言後郭黑略將兵征長安北山羌墮羌伏中時澄在堂上坐慘然改容曰郭公今有厄乃唱云衆僧祝願澄又自祝願須臾更曰若東南出者活餘向者則困復更祝願有頃曰脫矣後月餘黑略還自說墜羌圍中東南走馬乏正遇帳下人推馬與之曰公乘此馬小人乘公馬濟與不濟命也略得其馬故獲免推檢時日正是澄祝願時也時天旱季龍遣其太子詣臨漳西滏口祈雨久而不降乃令澄自行即有白龍二頭降於祠所其日大雨方數千里澄嘗遣弟子向西域市香既行澄告餘弟子曰掌中見買香弟子在某處被劫垂死因燒香祝願遙救護之弟子後還云某月某日某處為賊所劫垂當見殺忽聞香氣賊無故自驚曰救兵已至棄之而走黃河中舊不生黿時有得者以獻季龍澄見而歎之曰桓溫入河其不久乎溫字元子後果如其言也季龍嘗晝寢夢見羣羊負魚從東北來寤以訪澄澄曰不祥也鮮卑其有中原乎後亦皆驗澄嘗與季龍升中臺澄忽驚曰變變幽州當火災乃取酒噀之久而笑曰救已得矣季龍遣驗幽州云爾日火從四門起西南有黑雲來驟雨滅之雨亦頗有酒氣石宣將殺石韜宣先到寺與澄同坐浮屠一鈴獨鳴澄謂曰解鈴音乎鈴云胡子洛度宣變色曰是何言歟澄謬曰老胡為道不能山居無言重茵美服豈非洛度乎石韜後至澄孰視良久韜懼而問澄澄曰怪公血臭故相視耳季龍夢龍飛西南自天而落旦而問澄澄曰禍將作矣宜父子慈和深以慎之季龍引澄入東閣與其后杜氏問訊之澄曰脅下有賊不出十日自浮圖以西此殿以東當有血流慎勿東也杜后曰和尚耄邪何處有賊澄即易語云六情所受皆悉是賊老自應耄但使少者不昏即好耳遂便寓言不復彰的後二日宣果遣人害韜於佛寺中欲因季龍臨喪殺之季龍以澄先誡故獲免及宣被收澄諫季龍曰皆陛下之子也何為重禍邪陛下若含怒加慈者尚有六十餘歲如必誅之宣當為彗星下掃鄴宮季龍不從後月餘有一妖馬髦尾皆有燒狀入中陽門出顯陽門東首東宮皆不得入走向東北俄爾不見澄聞而歎曰災其及矣季龍大享羣臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣季龍令發殿石下視之有棘生焉冉閔小字棘奴季龍造太武殿初成圖畫自古賢聖忠臣孝子烈士貞女皆變為胡狀旬餘頭悉縮入肩中惟冠䯰髣佛微出季龍大惡之祕而不言也澄對之流涕乃自啓塋墓於鄴西紫陌還寺獨語曰得三年乎自答不得又曰得二年一年百日一月乎自答不得遂無復言謂弟子法祚曰戊申歲禍亂漸萌己酉石氏當滅吾及其未亂先從化矣卒於鄴宮寺後有沙門從雍州來稱見澄西入關季龍掘而視之惟有一石而無尸季龍惡之曰石者朕也葬我而去吾將死矣因而遇疾明年季龍死遂大亂麻襦麻襦者不知何許人也莫得其姓名石季龍時在魏縣市中乞丐恆著麻襦布裳故時人謂之麻襦言語卓越狀如狂者乞得米穀不食輒散置大路云飴天馬趙興太守籍狀收送詣季龍先是佛圖澄謂季龍曰國東二百里某月日當送一非常人勿殺之也如期果至季龍與共語了無異言惟道陛下當終一柱殿下季龍不解送以詣澄麻襦謂澄曰昔在光和中會奄至今日酉戎受玄命絶曆終有期金離消于壤邊荒不能遵驅除靈期迹莫已已之懿裔苗葉繁其來方積休期於何期永以歎之澄曰天回運極否將不支九木水為難無可以術寧玄哲雖存世莫能基必莫能基必穨久遊閻浮利擾擾多此患行登陵雲宇會於虛游間其所言人莫能曉季龍遣驛馬送還本縣既出城請步云我當有所過君至合口橋見待使人如言而馳至橋麻襦已先至後慕容俊投季龍尸於漳水倚橋柱不流時人以為一柱殿下即謂此也及元帝嗣位江左亦以為天馬之應云單道開單道開敦煌人也常衣粗褐或贈以繒服皆不著不畏寒暑晝夜不臥恆服細石子一吞數枚日一服或多或少好山居而山樹諸神見異形試之初無懼色石季龍時從西平來一日行七百里其一沙彌年十四行亦及之至秦州表送到鄴季龍令佛圖澄與語不能屈也初止鄴城西沙門法綝祠中後徙臨漳昭德寺於房內造重閣高八九尺於上編菅為禪室常坐其中季龍資給甚厚道開皆以施人人或來咨問者道開都不答日服鎮守藥數丸大如梧子藥有松蜜薑桂伏苓之氣時復飲荼蘇一二升而已自云能療目疾就療者頗驗視其行動狀若有神佛圖澄曰此道士觀國興衰若去者當有大亂及季龍末道開南渡許昌尋而鄴中大亂升平三年至京師後至南海入羅浮山獨處茅茨蕭然物外年百餘歲卒於山舍敕弟子以尸置石穴中弟子乃移入石室陳郡袁宏為南海太守與弟穎叔及沙門支法防共登羅浮山至石室口見道開形骸如生香火瓦器猶存宏曰法師業行殊羣正當如蟬蛻耳乃為之贊云僧涉僧涉者西域人也不知何姓少為沙門苻堅時入長安虛靜服氣不食五穀日能行五百里言未然之事驗若指掌能以祕祝下神龍每旱堅常使之呪龍請雨俄而龍下鉢中天輒大雨堅及羣臣親就鉢觀之卒於長安後大旱移時苻堅歎曰涉公若在豈憂此乎鳩摩羅什鳩摩羅什天竺人也世為國相父鳩摩羅炎聰懿有大節將嗣相位乃辭避出家東渡蔥嶺龜茲王聞其名郊迎之請為國師王有妹年二十才悟明敏諸國交娉並不許及見炎心欲當之王乃逼以妻焉既而羅什在胎其母慧解倍常及年七歲母遂與俱出家羅什從師受經日誦千偈偈有三十二字凡三萬二千言義亦自通年十二其母攜到沙勒國王甚重之遂停沙勒一年博覽五明諸論及陰陽星算莫不必盡妙達吉凶言若符契為性率達不拘小檢修行者頗共疑之然羅什自得於心未嘗介意專以大乘為化諸學者皆共師焉年二十龜茲王迎之還國廣說諸經四遠學徒莫之能抗有頃羅什母辭龜茲王往天竺留羅什住謂之曰方等深教不可思議傳之東土惟爾之力但於汝無利其可如何什曰必使大化流傳雖苦而無恨母至天竺道成進登第三果西域諸國咸伏羅什神俊每至講說諸王皆長跪坐側令羅什踐而登焉苻堅聞之密有迎羅什之意會太史奏云有星見外國分野當有大智入輔中國堅曰朕聞西域有鳩摩羅什將非此邪乃遣驍騎將軍呂光等率兵七萬西伐龜茲謂光曰若獲羅什即馳驛送之光軍未至羅什謂龜茲王白純曰國運衰矣當有勍敵從日下來宜恭承之勿抗其鋒純不從出兵距戰光遂破之乃獲羅什光見其年齒尚少以凡人戲之強妻以龜茲王女羅什距而不受辭甚苦至光曰道士之操不踰先父何所固辭乃飲以醇酒同閉密室羅什被逼遂妻之光還中路置軍於山下將士已休羅什曰在此必狼狽宜徙軍隴上光不納至夜果大雨洪潦暴起水深數丈死者數千人光密異之光欲留王西國羅什謂光曰此凶亡之地不宜淹留中路自有福地可居光還至涼州聞苻堅已為姚萇所害於是竊號河右屬姑臧大風羅什曰不祥之風當有姦叛然不勞自定也俄而有叛者尋皆殄滅沮渠蒙遜先推建康太守段業為主光遣其子纂率衆討之時論謂業等烏合纂有威聲勢必全克光以訪羅什答曰此行未見其利既而纂敗於合黎俄又郭起兵纂棄大軍輕還復為所敗僅以身免中書監張資病光博營救療有外國道人羅叉云能差資病光喜給賜甚重羅什知叉誑詐告資曰叉不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩叉療果無效少日資亡頃之光死纂立有猪生子一身三頭龍出東箱井中於殿前蟠臥比旦失之纂以為美瑞號其殿為龍翔殿俄而有黑龍升於當陽九宮門纂改九宮門為龍興門羅什曰比日潛龍出游豕妖表異龍者陰類出入有時而今屢見則為災眚必有下人謀上之變宜克己修德以答天戒纂不納後果為呂超所殺羅什之在涼州積年呂光父子既不弘道故蘊其深解無所宣化姚興遣姚碩德西伐破呂隆乃迎羅什待以國師之禮仍使入西明閣及逍遙園譯出衆經羅什多所暗誦無不究其義旨既覽舊經多有紕繆於是興使沙門僧睿僧肇等八百餘人傳受其旨更出經論凡三百餘卷沙門慧睿才識高明常隨羅什傳寫羅什每為慧睿論西方辭體商略同異云天竺國俗甚重文制其宮商體韵以入管弦為善凡覲國王必有贊德經中偈頌皆其式也羅什雅好大乘志在敷演常歎曰吾若著筆作大乘阿毗曇非迦旃子比也今深識者既寡將何所論惟為姚興著實相論二卷興奉之若神嘗講經於草堂寺興及朝臣大德沙門千有餘人肅容觀聽羅什忽下高坐謂興曰有二小兒登吾肩欲鄣須婦人興乃召宮女進之一交而生二子焉興嘗謂羅什曰大師聰明超悟天下莫二何可使法種少嗣遂以伎女十人逼令受之爾後不住僧坊別立解舍諸僧多效之什乃聚針盈鉢引諸僧謂之曰若能見效食此者乃可畜室耳因舉匕進針與常食不別諸僧愧服乃止杯渡比丘在彭城聞羅什在長安乃歎曰吾與此子戲別三百餘年相見杳然未期遲有遇於來生耳羅什未終少日覺四大不悆乃口出三番神呪令外國弟子誦之以自救未及致力轉覺危殆於是力疾與衆僧告別曰因法相遇殊未盡心方復後世惻愴可言死於長安姚興於逍遙園依外國法以火焚尸薪滅形碎惟舌不爛曇霍沙門曇霍者不知何許人也禿髮傉檀時從河南來持一錫杖令人跪曰此是般若眼奉之可以得道時人咸異之或遺以衣服受而投之於河後日以還其本主衣無所汙行步如風雲言人死生貴賤無毫釐之差人或藏其錫杖曇霍大哭數聲閉目須臾起而取之咸奇其神異莫能測也每謂傉檀曰若能安坐無為則天下可定祚胤克昌如其窮兵好殺禍將及己傉檀不能從傉檀女病甚請救療曇霍曰人之生死自有定期聖人亦不能轉禍為福曇霍安能延命邪正可知早晚耳傉檀固請之時後宮門閉曇霍曰急開後門及開門則生不及則死傉檀命開之不及而死後兵亂不知所在也臺産臺産字國俊上洛人漢侍中崇之後也少專京氏易善圖讖祕緯天文洛書風角星算六日七分之學尤善望氣占候推步之術隱居商洛南山兼善經學泛情教授不交當世劉曜時災異特甚命公卿各舉博識直言之士一人其大司空劉均舉産曜親臨東堂遣中黃門策問之産極言其故曜覽而嘉之引見訪以政事産流涕歔欷具陳災變之禍政化之闕辭甚懇至曜改容禮之署為博士祭酒諫議大夫領太史令至明年而其言皆驗曜彌重之轉太中大夫歲中三遷歷位尚書光祿大夫太子少師位特進金章紫綬爵關中侯史臣曰陳戴等諸子並該洽墳典研精數術究推步之幽微窮陰陽之祕奧雖前代京管何以加之郭知有晉之亡姚去姚以歸晉追兵奄及致斃中塗斯則遠見秋毫不能近知目睫澄什爰自遐裔來游諸夏什既兆見星象澄乃驅役鬼神並通幽洞冥垂文闡教諒見珍於道藝非取貴於他山姚石奉之若神良有以也鮑吳王幸等或假靈道訣或受教神方遂能厭勝禳災隱文彰義雖獲譏於妖妄頗有益於世用者焉然而碩學通人未宜枉轡贊曰傳敘災祥書稱龜筮應如影響叶若符契怪力亂神詭時惑世崇尚弗已必致流弊
