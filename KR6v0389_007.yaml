body:
  text: 西戎天竺國即漢之身毒國或云婆羅門地也在葱嶺西北九周三萬餘里其中分為五天竺其一曰中天竺二曰東天竺三曰南天竺四曰西天竺五曰北天竺地各數千里城邑數百南天竺際大海北天竺拒雪山四周有山為壁南面一谷通為國門東天竺東際大海與扶南林邑鄰接西天竺與罽賓波斯相接中天竺據四天竺之會其都城周回七十餘里北臨禪連河云昔有婆羅門領徒千人肄業於樹下樹神降之遂為夫婦宮室自然而立僮僕甚盛於是使役百神築城以統之經日而就此後有阿育王復役使鬼神纍石為宮闕皆雕文刻鏤非人力所及阿育王頗行苛政置炮烙之刑謂之地獄今城中見有其迹焉中天竺王姓乞利嘻氏或云剎利氏世有其國不相篡弒厥土卑濕暑熱稻歲四熟有金剛似紫石英百鍊不銷可以切玉又有旃檀鬱金諸香通於大秦故其寶物或至扶南交趾貿易焉百姓殷樂俗無簿籍耕王地者輸地利以齒貝為貨人皆深目長鼻致敬極者䑛足摩踵家有奇樂倡伎其王與大臣多服錦罽上為螺髻於頂餘髮翦之使拳俗皆徒跣衣重白色唯梵志種姓披白疊以為異死者或焚尸取灰以為浮圖或委之中野以施禽獸或流之於河以飼魚鱉無喪紀之文謀反者幽殺之小犯罰錢以贖罪不孝則斷手刖足截耳割鼻放流邊外有文字善天文算曆之術其人皆學悉曇章云是梵天法書於貝多樹葉以紀事不殺生飲酒國中往往有舊佛跡隋煬帝時遣裴矩應接西蕃諸國多有至者唯天竺不通帝以為恨當武德中其國大亂其嗣王尸羅逸多練兵聚衆所向無敵象不解鞍人不釋甲居六載而四天竺之君皆北面以臣之威勢遠振刑政甚肅貞觀十五年尸羅逸多自稱摩伽陀王遣使朝貢太宗降璽書慰問尸羅逸多大驚問諸國人曰自古曾有摩訶震旦使人至吾國乎皆曰未之有也乃膜拜而受詔書因遣使朝貢太宗以其地遠禮之甚厚復遣衛尉丞李義表報使尸羅逸多遣大臣郊迎傾城邑以縱觀焚香夾道逸多率其臣下東面拜受敕書復遣使獻火珠及鬱金香菩提樹貞觀十年沙門玄奘至其國將梵本經論六百餘部而歸先是遣右率府長史王玄策使天竺其四天竺國王咸遣使朝貢會中天竺王尸羅逸多死國中大亂其臣那伏帝阿羅那順篡立乃盡發胡兵以拒玄策玄策從騎三十人與胡禦戰不敵矢盡悉被擒胡並掠諸國貢獻之物玄策乃挺身宵遁走至吐蕃發精鋭一千二百人并泥婆羅國七千餘騎以從玄策玄策與副使蔣師仁率二國兵進至中天竺國城連戰三日大破之斬首三千餘級赴水溺死者且萬人阿羅那順棄城而遁師仁進擒獲之虜男女萬二千人牛馬三萬餘頭匹於是天竺震懼俘阿羅那順以歸二十二年至京師太宗大悅命有司告宗廟而謂羣臣曰夫人耳目玩於聲色口鼻耽於臭味此乃敗德之源若婆羅門不劫掠我使人豈為俘虜耶昔中山以貪寶取弊蜀侯以金牛致滅莫不由之拜玄策朝散大夫是時就其國得方士那羅邇娑婆寐自言壽二百歲云有長生之術太宗深加禮敬館之於金飈門內造延年之藥令兵部尚書崔敦禮監主之發使天下採諸奇藥異石不可稱數延歷歲月藥成服竟不效後放還本國太宗之葬昭陵也刻石像阿羅那順之形列於玄闕之下五天竺所屬之國數十風俗物産略同有伽沒路國其俗開東門以向日王玄策至其王發使貢以奇珍異物及地圖因請老子像及道德經那揭陀國有醯羅城中有重閣藏佛頂骨及錫杖貞觀二十年遣使貢方物天授二年東天竺王摩羅枝摩西天竺王尸羅逸多南天竺王遮婁其拔羅婆北天竺王婁其那那中天竺王地婆西那並來朝獻景龍四年南天竺國復遣使來朝景雲元年復遣使貢方物開元二年西天竺復遣使貢方物八年南天竺國遣使獻五色能言鸚鵡其年南天竺國王尸利那羅僧伽請以戰象及兵馬討大食及吐蕃等仍求有及名其軍玄宗甚嘉之名軍為懷德軍九月南天竺王尸利那羅僧伽寶多枝摩為國造寺上表乞寺額敕以歸化為名賜之十一月遣使冊利那羅伽寶多為南天竺國王遣使來朝十七年六月北天竺國三藏沙門僧密多獻質汗等藥一十九年十月中天竺國王伊沙伏摩遣其大德僧來朝貢二十九年三月中天竺王子李承恩來朝授游擊將軍放還天寶中纍遣使來
