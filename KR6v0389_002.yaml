body:
  text: 夷蠻呵羅單國治闍婆洲元嘉七年遣使獻金剛指鐶赤鸚鵡鳥天竺國白疊古貝葉波國古貝等物十年呵羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安隱三達六通為世間道是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山村邑聚落次第羅匝城郭館宇如忉利天宮宮殿高廣樓閣莊嚴四兵具足能伏怨敵國土豐樂無諸患難奉承先王正法治化人民良善慶無不利處雪山陰雪水流注百川洋溢八味清淨周匝屈曲順趣大海一切衆生咸得受用於諸國土殊勝第一是名震旦大宋揚都承嗣常勝大王之業德合天心仁廕四海聖智周備化無不順雖人是天護世降生功德寶藏大悲救世為我尊主常勝天子是故至誠五體敬禮呵羅單國王毗沙跋摩稽首問訊其後為子所篡奪十三年又上表曰大吉天子足下離淫怒癡哀愍羣生想好具足天龍神等恭敬供養世尊威德身光明照如水中月如日初出眉間白豪普照十方其白如雪亦如月光清淨如華顏色照曜威儀殊勝諸天龍神之所恭敬以正法寶梵行衆僧莊嚴國土人民熾盛安隱快樂城閣高峻如乾他山衆多勇士守護此城樓閣莊嚴道巷平正著種種衣猶如天服於一切國為最殊勝吉揚州城無憂天主愍念羣生安樂民人律儀清淨慈心深廣正法治化共養三寶名稱遠至一切並聞民人樂見如月初生譬如梵王世界之主一切人天恭敬作禮呵羅單跋摩以頂禮足猶如現前以體布地如殿陛道供養恭敬如奉世尊以頂著地曲躬問訊忝承先業嘉慶無量忽為惡子所見爭奪遂失本國今唯一心歸誠天子以自存命今遣毗紉問訊大家意欲自往歸誠宣訴復畏大海風波不達今命得存亦由毗紉此人忠志其恩難報此是大家國今為惡子所奪而見驅擯意頗忿惋規欲雪復伏願大家聽毗紉買諸鎧仗袍襖及馬願為料理毗紉使得時還前遣闍邪仙婆羅訶蒙大家厚賜悉惡子奪去啓大家使知今奉薄獻願垂納受此後又遣使二十六年太祖詔曰訶羅單媻皇媻達三國頻越遐海款化納貢遠誠宜甄可並加除授乃遣使策命之曰惟爾慕義款化效誠荒遐恩之所洽殊遠必甄用敷典章顯茲策授爾其欽奉凝命永固厥職可不慎歟二十九年又遣長史媻和沙彌獻方物媻皇國元嘉二十六年國王舍利媻羅跋摩遣使獻方物四十一種太祖策命之為媻皇國王曰惟爾仰政邊城率貢來庭皇澤凱被無幽不洽宜班典策授茲嘉命爾其祇順禮度式保厥終可不慎歟二十八年復貢獻世祖孝建三年又遣長史竺那媻智奉表獻方物以那媻智為振威將軍大明三年獻赤白鸚鵡大明八年太宗泰始二年又遣使貢獻太宗以其長史竺須羅達前長史振威將軍竺那媻智並為龍驤將軍媻達國元嘉二十六年國王舍利不陵伽跋摩遣使獻方物太祖策命之為婆達國王曰惟爾仰化懷誠馳慕聲教皇風遐暨荒服來款是用加茲顯策式甄義順爾其祇順憲典永終休福可不慎歟二十六年二十八年復遣使獻方物闍婆婆達國元嘉十二年國王師黎婆達陀阿羅跋摩遣使奉表曰宋國大主大吉天子足下敬禮一切種智安隱天人師降伏四魔成等正覺轉尊法輪度脫衆生教化已周入于涅槃舍利流布起無量塔衆寶莊嚴如須彌山經法流布如日照明無量淨僧猶如列宿國界廣大民人衆多宮殿城郭如忉利天宮名大宋揚州大國大吉天子安處其中紹繼先聖王有四海閻浮提內莫不來服悉以茲水普飲一切我雖在遠亦霑靈潤是以雖隔巨海常遙臣屬願照至誠垂哀納受若蒙聽許當年遣信若有所須惟命是獻伏願信受不生異想今遣使主佛大陀婆副使葛抵奉宣微誠稽首敬禮大吉天子足下陀婆所啓願見信受諸有所請唯願賜聽今奉微物以表微心師子國元嘉五年國王剎利摩訶南奉表曰謹白大宋明主雖山海殊隔而音信時通伏承皇帝道德高遠覆載同於天地明照齊乎日月四海之外無往不伏方國諸王莫不遣信奉獻以表歸德之誠或泛海三年陸行千日畏威懷德無遠不至我先王以來唯以修德為正不嚴而治奉事三寶道濟天下欣人為善慶若在己欲與天子共弘正法以度難化故託四道人遣二白衣送牙臺像以為信誓信還願垂音告至十二年又復遣使奉獻天竺迦毗黎國元嘉五年國王月愛遣使奉表曰伏聞彼國據江傍海山川周固衆妙悉備莊嚴清淨猶如化城宮殿莊嚴街巷平坦人民充滿歡娛安樂聖王出遊四海隨從聖明仁愛不害衆生萬邦歸仰國富如海國中衆生奉順正法大王仁聖化之以道慈施羣生無所遺惜帝修淨戒軌道不及無上法船濟諸沈溺羣僚百官受樂無怨諸天擁護萬神侍衛天魔降伏莫不歸化王身端嚴如日初出仁澤普潤猶如大雲聖賢承業如日月天於彼真丹最為殊勝臣之所住名迦毗河東際于海其城四邊悉紫紺石首羅天護令國安隱國王相承未嘗斷絶國中人民率皆修善諸國來集共遵道法諸寺舍子皆七寶形像衆妙供具如先王法臣自修檢不犯道禁臣名月愛棄世王種惟願大王聖體和善羣臣百官悉自安隱今以此國羣臣吏民山川珍寶一切歸屬五體歸誠大王足下山海遐隔無由朝覲宗仰之至遣使下承使主父名天魔悉達使主名尼陀達此人由來良善忠信是故今遣奉使表誠大王若有所須珍奇異物悉當奉送此之境土便是王國王之法令治國善道悉當承用願二國信使往來不絶此反使還願賜一使具宣聖命備勑所宜款至之誠望不空反所白如是願加哀愍奉獻金剛指環摩勒金環諸寶物赤白鸚鵡各一頭太宗泰始二年又遣使貢獻以其使主竺扶大竺阿彌並為建威將軍元嘉十八年蘇摩黎國王那鄰那羅跋摩遣使獻方物世祖孝建二年斤陀利國王釋婆羅那鄰陀遣長史竺留陀及多獻金銀寶器後廢帝元徽元年婆黎國遣使貢獻凡此諸國皆事佛道佛道自後漢明帝法始東流自此以來其教稍廣自帝王至于民庶莫不歸心經誥充積訓義深遠別為一家之學焉元嘉十二年丹陽尹蕭摹之奏曰佛化被于中國已歷四代形像塔寺所在千數進可以繫心退足以招勸而自頃以來情敬浮末不以精誠為至更以奢競為重舊宇頽弛曾莫之修而各務造新以相姱尚甲第顯宅於茲殆盡材竹銅綵糜損無極無關神祇有纍人事建中越制宜加裁檢不為之防流遁未息請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舍皆先詣在所二千石通辭郡依事列言本州須許報然後就功其有輒造寺舍者皆依不承用詔書律銅宅林苑悉沒入官詔可又沙汰沙門罷道者數百人世祖大明二年有曇標道人與羌人高闍謀反上因是下詔曰佛法訛替沙門混雜未足扶濟鴻教而專成逋藪加姦心頻發凶狀屢聞敗亂風俗人神交怨可付所在精加沙汰後有違犯嚴加誅坐於是設諸條禁自非戒行精苦並使還俗而諸寺尼出入宮掖交關妃后此制竟不能行先是晉世庾冰始創議欲使沙門敬王者後桓玄復述其義並不果行大明六年世祖使有司奏曰臣聞邃宇崇居非期宏峻拳跪槃伏非止敬恭將以施張四維締制八宇故雖儒法枝派名墨條分至於崇親嚴上厥繇靡爽唯浮圖為教逖自龍堆反經提傳訓遐事遠練生瑩識恆俗稱難宗旨緬謝微言淪隔拘文蔽道在末彌扇遂乃陵越典度偃倨尊戚失隨方之眇迹迷製化之淵義夫佛法以謙儉自牧忠虔為道不輕比丘遭人斯拜目連桑門遇長則禮寧有屈膝四輩而簡禮二親稽顙耆臘而直體萬乘者哉故咸康創議元興載述而事屈偏黨道挫餘分今鴻源遙洗羣流仰鏡九仙賮寶百神聳職而畿輦之內舍弗臣之氓陛席之間延抗禮之客懼非所以澄一風範詳示景則者也臣等參議以為沙門接見比當盡虔禮敬之容依其本俗則朝徽有序乘方兼遂矣詔可前廢帝初復舊世祖寵姬殷貴妃薨為之立寺貴妃子子鸞封新安王故以新安為寺號前廢帝殺子鸞乃毀廢新安寺驅斥僧徒尋又毀中興天寶諸寺太宗定亂下令曰先帝建中興及新安諸寺所以長世垂範弘宣盛化頃遇昏虐法像殘毀師徒奔迸甚以矜懷妙訓淵謨有扶名教可招集舊僧普各還本並使材官隨宜修復宋世名僧有道生道生彭城人也父為廣戚令生出家為沙門法大弟子幼而聰悟年十五便能講經及長有異解立頓悟義時人推服之元嘉十一年卒於廬山沙門慧琳為之誄慧琳者秦郡秦縣人姓劉氏少出家住冶城寺有才章兼外內之學為廬陵王義真所知嘗著均善論其詞曰有白學先生以為中國聖人經綸百世其德弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聰睿迪哲何負於殊論哉有黑學道士陋之謂不照幽冥之途弗及來生之化雖尚虛心未能虛事不逮西域之深也於是白學訪其所以不逮云爾白曰釋氏所論之空與老氏所言之空無同異乎黑曰異釋氏即物為空空物為一老氏有無兩行空有為異安得同乎白曰釋氏空物物信空邪黑曰然空又空不翅於空矣白曰三儀靈長於宇宙萬品盈生於天地孰是空哉黑曰空其自性之有不害因假之體也今構羣材以成大廈罔專寢之實積一豪以致合抱無檀木之體有生莫俄頃之留泰山蔑纍息之固興滅無常因緣無主所空在於性理所難據於事用吾以為誤矣白曰所言實相空者其如是乎黑曰然白曰浮變之理交於目前視聽者之所同了邪解之以登道場重之以輕異學誠未見其淵深黑曰斯理若近求之實遠夫情之所重者虛事之可重者實今虛其真實離其浮僞愛欲之惑不得不去愛去而道場不登者吾不知所以相曉也白曰今析豪空樹無垂蔭之茂離材虛室不損輪奐之美明無常增其愒蔭之情陳若偏篤其競辰之慮貝錦以繁采發輝和羹以鹽梅致旨齊侯追爽鳩之樂燕王無延年之術恐和合之辨危脆之教正足戀其嗜好之欲無以傾其愛競之惑也黑曰斯固理絶於諸華墳素莫之及也白曰山高纍卑之辭川樹積小之詠舟壑火傳之談堅白唐肆之論蓋盈於中國矣非理之奧故不舉以為教本耳子固以遺情遺纍虛心為道而據事剖析者更由指掌之間乎黑曰周孔為教正及一世不見來生無窮之緣積善不過子孫之慶纍惡不過餘殃之罰報效止於榮祿誅責極於窮賤視聽之外冥然不知良可悲矣釋迦關無窮之業拔重關之險陶方寸之慮宇宙不足盈其明設一慈之救羣生不足勝其化敘地獄則民懼其罪敷天堂則物歡其福指泥洹以長歸乘法身以遐覽神變無不周靈澤靡不覃先覺翻翔於上世後悟騰翥而不紹坎井之局何以識大方之家乎白曰固能大其言矣今效神光無徑寸之明驗靈變罔纖介之異勤誠者不覩善救之貌篤學者弗剋陵虛之實徒稱無量之壽孰見期頤之叟咨嗟金剛之固安覿不朽之質苟於事不符宜尋立言之指遺其所寄之說也且要天堂以就善曷若服義而蹈道懼地獄以敕身孰與從理以端心禮拜以求免罪不由祗肅之意施一以徼百倍弗乘無吝之情美泥洹之樂生耽逸之慮贊法身之妙肇好奇之心近欲未弭遠利又興雖言菩薩無欲羣生固以有欲矣甫救交敝之氓永開利競之俗澄神反道其可得乎黑曰不然若不示以來生之欲何以權其當生之滯物情不能頓至故積漸以誘之奪此俄頃要彼無窮若弗勤春稼秋穡何期端坐井底而息意庶慮者長淪於九泉之下矣白曰異哉何所務之乖也道在無欲而以有欲要之北行求郢西征索越方長迷於幽都永謬滯於昧谷遼遼閩楚其可見乎所謂積漸者日損之謂也當先遺其所輕然後忘其所重使利欲日去淳白自生耳豈得以少要多以粗易妙俯仰之間非利不動利之所蕩其有極哉乃丹青眩媚綵之目土木夸好壯之心興糜費之道單九服之財樹無用之事割羣生之急致營造之計成私樹之權務勸化之業結師黨之勢苦節以要厲精之譽護法以展陵競之情悲矣夫道其安寄乎是以周孔敦俗弗關視聽之外老莊陶風謹守性分而已黑曰三遊本於仁義盜跖資於五善聖跡之敝豈有內外且黃老之家符章之僞水祝之誣不可勝論子安於彼駭於此玩於濁水違於清淵耳白曰有跡不能不敝有術不能無僞此乃聖人所以桎梏也今所惜在作法於貪遂以成俗不正其敝反以為高耳至若淫妄之徒世自近鄙源流蔑然固不足論黑曰釋氏之教專救夷俗便無取於諸華邪白曰曷為其然為則開端宜懷屬緒愛物去殺尚施周人息心遺榮華之願大士布兼濟之念仁義玄一者何以尚之惜乎幽旨不亮末流為纍耳黑曰子之論善殆同矣便事盡於生乎白曰幽冥之理固不極於人事矣周孔疑而不辨釋迦辨而不實將宜廢其顯晦之跡存其所要之旨請嘗言之夫道之以仁義者服理以從化帥之以勸戒者循利而遷善故甘辭興於有欲而滅於悟理淡說行於天解而息於貪僞是以示來生者蔽虧於道釋不得已杜幽暗者冥符於姬孔閉其兌由斯論之言之者未必遠知之者未必得不知者未必失但知六度與五教並行信順與慈悲齊立耳殊塗而同歸者不得守其發輪之轍也論行於世舊僧謂其貶黜釋氏欲加擯斥太祖見論賞之元嘉中遂參權要朝廷大事皆與議焉賓客輻湊門車常有數十兩四方贈賂相係勢傾一時注孝經及莊子逍遙篇文論傳於世又有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬬場寺多禪僧京師為之語曰鬬場禪師窟東安談義林世祖大明四年於中興寺設齊有一異僧衆莫之識問其名答言名明慧從天安寺來忽然不見天下無此寺名乃改中興曰天安寺大明中外國沙門摩訶衍苦節有精理於京都多出新經勝鬘經尤見重內學
