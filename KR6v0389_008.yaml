body:
  text: 列傳第八十九釋老釋老之教行乎中國也千數百年而其盛衰每繫乎時君之好惡是故佛於晉宋梁陳黃老于漢魏唐宋而其效可覩矣元興崇尚釋氏而帝師之盛尤不可與古昔同語維道家方士之流假禱祠之說乘時以起曾不及其什一焉宋舊史嘗志老釋厥有旨哉乃本其意作釋老傳帝師八思巴者土番薩斯迦人族款氏也相傳自其祖朵栗赤以其法佐國主霸西海者十餘世八思巴生七歲誦經數十萬言能約通其大義國人號之聖童故名曰八思巴少長學富五明故又稱曰班彌怛歲癸丑年十有五謁世祖于潛邸與語大悅日見親禮中統元年世祖即位尊為國師授以玉印命製蒙古新字字成上之其字僅千餘其母凡四十有一其相關紐而成字者則有韻關之法其以二合三合四合而成字者則有語韻之法而大要則以諧聲為宗也至元六年詔頒行於天下詔曰朕惟字以書言言以紀事此古今之通制我國家肇基朔方俗尚簡古未遑制作凡施用文字因用漢楷及畏吾字以達本朝之言考諸遼金以及遐方諸國例各有字今文治寖興而字書有闕於一代制度實為未備故特命國師八思巴創為蒙古新字譯寫一切文字期於順言達事而已自今以往凡有璽書頒降者並用蒙古新字仍各以其國字副之遂升號八思巴曰大寶法王更賜玉印十一年請告西還留之不可乃以其弟亦憐真嗣焉十六年八思巴卒訃聞賻贈有加賜號皇天之下一人之上開教宣文輔治大聖至德普覺真智佑國如意大寶法王西天佛子大元帝師至治間特詔郡縣建廟通祀泰定元年又以繪像十一頒各行省為之塑像云亦憐真嗣為帝師凡六歲至元十九年卒答兒麻八剌乞列剌吉塔嗣二十三年卒亦攝思連真嗣三十一年卒乞剌斯八斡節兒嗣成宗特造寶玉五方佛冠賜之元貞元年又更賜雙龍盤紐白玉印文曰大元帝師統領諸國僧尼中興釋教之印大德七年卒明年以輦真監藏嗣又明年卒都相家班嗣皇慶二年卒相兒加思巴嗣延祐元年卒二年以公哥羅古羅思監藏班藏卜嗣至治三年卒旺出兒監藏嗣泰定二年卒公歌列思八冲納思監藏班藏卜嗣賜玉印降璽書諭天下其年卒天曆二年以輦真吃剌失思嗣八思巴時又有國師膽巴者一名功嘉葛剌思西番突甘斯旦麻人幼從西天竺古達麻失利傳習梵祕得其法要中統間帝師八思巴薦之時懷孟大旱世祖命禱之立雨又嘗咒食投龍湫頃之奇花異果上尊湧出波面取以上進世祖大悅至元末以不容於時相桑哥力請西歸既復召還謫之潮州時樞密副使月的迷失鎮潮而妻得奇疾膽巴以所持數珠加其身即愈又嘗為月的迷失言異夢及己還朝期後皆驗元貞間海都犯西番界成宗命禱于摩訶葛剌神已而捷書果至又為成宗禱疾遄愈賜與甚厚且詔分御前校尉十人為之導從成宗北巡命膽巴以象輿前導過雲州語諸弟子曰此地有靈怪恐驚乘輿當密持神呪以厭之未幾風雨大至眾咸震懼惟幄殿無虞復賜碧鈿盃一大德七年夏卒皇慶間追號大覺普惠廣照無上膽巴帝師其後又有必蘭納識里者初名只剌瓦彌的理北庭感木魯國人幼熟畏兀兒及西天書長能貫通三藏暨諸國語大德六年奉旨從帝師授戒於廣寒殿代帝出家更賜今名皇慶中命繙譯諸梵經典延祐間特賜銀印授光祿大夫是時諸番朝貢表牋文字無能識者皆令必蘭納識理譯進嘗有以金刻字為表進者帝遣視之廷中愕眙觀所以對必蘭納識理隨取案上墨汁塗金葉審其字命左右執筆口授表中語及使人名氏與貢物之數書而上之明日有司閱其物色與所齎重譯之書無少差者眾無不服其博識而竟莫測其何所從授或者以為神悟云授開府儀同三司仍賜三臺銀印兼領功德使司事厚其廩餼俾得以養母焉至治三年改賜金印特授沙律津愛護持且命為諸國引進使至順二年又賜玉印加號普覺圓明廣照弘辯三藏國師三年與安西王子月魯帖木兒等謀為不軌坐誅其所譯經漢字則有楞嚴經西天字則有大乘莊嚴寶度經乾陀般若經大涅槃經稱讚大乘功德經西番字則有不思議禪觀經通若干卷元起朔方固已崇尚釋教及得西域世祖以其地廣而險遠民獷而好鬬思有以因其俗而柔其人乃郡縣土番之地設官分職而領之於帝師乃立宣政院其為使位居第二者必以僧為之出帝師所辟舉而總其政於內外者帥臣以下亦必僧俗並用而軍民通攝於是帝師之命與詔敕並行於西土百年之間朝廷所以敬禮而尊信之者無所不用其至雖帝后妃主皆因受戒而為之膜拜正衙朝會百官班列而帝師亦或專席於坐隅且每帝即位之始降詔褒護必敕章佩監絡珠為字以賜蓋其重之如此其未至而迎之則中書大臣馳驛累百騎以往所過供億送迎比至京師則敕大府假法駕半仗以為前導詔省臺院官以及百司庶府並服銀鼠質孫用每歲二月八日迎佛威儀往迓且命禮部尚書郎中專督迎接及其卒而歸葬舍利又命百官出郭祭餞大德九年專遣平章政事鐵木兒乘傳護送賻金五百兩銀千兩幣帛萬匹鈔三千錠皇慶二年加至賻金五千兩銀一萬五千兩錦綺雜綵共一萬七千匹雖其昆弟子姓之往來有司亦供億無乏泰定間以帝師弟公哥亦思監將至詔中書持羊酒郊勞而其兄瑣南藏卜遂尚公主封白蘭王賜金印給圓符其弟子之號司空司徒國公佩金玉印章者前後相望為其徒者怙勢恣睢日新月盛氣焰熏灼延于四方為害不可勝言有楊璉真加者世祖用為江南釋教總統發掘故宋趙氏諸陵之在錢唐紹興者及其大臣塚墓凡一百一所戕殺平民四人受人獻美女寶物無算且攘奪盜取財物計金一千七百兩銀六千八百兩玉帶九玉器大小百一十有一雜寶貝百五十有二大珠五十兩鈔一十一萬六千二百錠田二萬三千畝私庇平民不輸公賦者二萬三千戶他所藏匿未露者不論也又至大元年上都開元寺西僧強市民薪民訴諸留守李璧璧方詢問其由僧已率其黨持白梃突入公府隔案引璧髮捽諸地捶撲交下拽之以歸閉諸空室久乃得脫奔訴于朝遇赦以免二年復有僧龔柯等十八人與諸王合兒八剌妃忽禿赤的斤爭道拉妃墮車毆之且有犯上等語事聞詔釋不問而宣政院臣方奏取旨凡民毆西僧者截其手詈之者斷其舌時仁宗居東宮聞之亟奏寢其令泰定二年西臺御史李昌言嘗經平涼府靜會定西等州見西番僧佩金字圓符絡繹道途馳騎累百傳舍至不能容則假館民舍因迫逐男子奸污女婦奉元一路自正月至七月往返者百八十五次用馬至八百四十餘匹較之諸王行省之使十多六七驛戶無所控訴臺察莫得誰何且國家之製圓符本為邊防警報之虞僧人何事而輒佩之乞更正僧人給驛法且令臺憲得以糾察不報必蘭納識里之誅也有司籍之得其人畜土田金銀貨貝錢幣邸舍書畫器玩以及婦人七寶裝具價直鉅萬萬云若歲時祝釐禱祠之常號稱好事者其目尤不一有曰鎮雷阿藍納四華言慶讚也有曰亦思滿藍華言藥師壇也有曰搠思串卜華言護城也有曰朵兒禪華言大施食也有曰朵兒只列朵四華言美妙金剛迴遮施食也有曰察兒哥朵四華言迴遮也有曰籠哥兒華言風輪也有曰喒朵四華言作施食也有曰出朵兒華言出水濟六道也有曰党剌朵四華言迴遮施食也有曰典朵兒華言常川施食也有曰坐靜有曰魯朝華言獅子吼道場也有曰黑牙蠻答哥華言黑獄帝主也有曰搠思江朵兒麻華言護江法神施食也有曰赤思古林搠華言自受主戒也有曰鎮雷坐靜有曰吃剌察坐靜華言祕密坐靜也有曰斟惹華言文殊菩薩也有曰古林朵四華言至尊大黑神迴遮施食也有曰歇白咱剌華言大喜樂也有曰必思禪華言無量壽也有曰覩思哥兒華言白傘蓋呪也有曰收札沙剌華言五護陀羅尼經也有曰阿昔答撒答哈昔里華言八十千頌般若經也有曰撒思納屯華言大理天神呪也有曰闊兒魯丳卜屯華言大輪金剛呪也有曰且八迷屯華言無量壽經也有曰亦思羅八華言最勝王經也有曰撒思納屯華言護神呪也有曰南占屯華言懷壞相金剛也有曰卜魯八華言呪法也又有作擦擦者以泥作小浮屠也又有作答兒剛者其作答兒剛者或一所二所以至七所作擦擦者或十萬二十萬以至三十萬又嘗造浮屠二百一十有六實以七寶珠玉半置海畔半置水中以鎮海災延祐四年宣徽使會每歲內廷佛事所供其費以斤數者用麪四十三萬九千五百油七萬九千酥二萬一千八百七十蜜二萬七千三百自至元三十年間醮祠佛事之目僅百有二大德七年再立功德司遂增至五百有餘僧徒貪利無已營結近侍欺昧奏請布施莽齋所需非一歲費千萬較之大德不知幾倍又每歲必因好事奏釋輕重囚徒以為福利雖大臣如阿里閫帥如別沙兒等莫不假是以逭其誅宣政院參議李良弼受賕鬻官直以帝師之言縱之其餘殺人之盜作奸之徒夤緣幸免者多至或取空名宣敕以為布施而任其人可謂濫矣凡此皆有關乎一代之治體者故今備著焉若夫天下寺院之領於內外宣政院曰禪曰教曰律則固各守其業惟所謂白雲宗白蓮宗者亦或頗通奸利云丘處機登州棲霞人自號長春子兒時有相者謂其異日當為神仙宗伯年十九為全真學于寧海之崑窬嵛山與馬鈺譚處端劉處玄王處一郝大通孫不二同師重陽王真入重陽一見處機大器之金宋之季俱遣使來召不赴歲己卯太祖自乃蠻命近臣札八兒劉仲祿持詔求之處機一日忽語其徒使促裝曰天使來召我我當往翌日二人者至處機乃與弟子十有八人同往見焉明年宿留山北先馳表謝拳拳以止殺為勸又明年趣使再至乃發撫州經數十國為地萬有餘里蓋蹀血戰場避寇叛域絕糧沙漠自崑嵛歷四載而始達雪山常馬行深雪中馬上舉策試之未及積雪之半既見太祖大悅賜食設廬帳甚飭太祖時方西征日事攻戰處機每言欲一天下者必在乎不嗜殺人及問為治之方則對以敬天愛民為本問長生久視之道則告以清心寡欲為要太祖深契其言曰天錫仙翁以寤朕志命左右書之且以訓諸子焉於是錫之虎符副以璽書不斥其名惟曰神仙一日雷震太祖以問處機對曰雷天威也人罪莫大於不孝不孝則不順乎天故天威震動以警之似聞境內不孝者多陛下宜明天威以導有眾太祖從之歲癸未太祖大獵于東山馬踣處機請曰天道好生陛下春秋高數畋獵非宜太祖為罷獵者久之時國兵踐蹂中原河南北尤甚民罹俘戮無所逃命處機還燕使其徒持牒招求於戰伐之餘由是為人奴者得復為良與濱死而得更生者毋慮二三萬人中州人至今稱道之歲乙酉熒惑犯尾其占在燕處機禱之果退舍丁亥又為旱禱期以三日雨當名瑞應已而亦驗有旨改賜宮名曰長春且遣使勞問制若曰朕常念神仙神仙毋忘朕也六月浴于東溪越二日天大雷雨太液池岸北水入東湖聲聞數里魚鱉盡去池遂涸而北口高岸亦崩處機嘆曰山其摧乎池其涸乎吾將與之俱乎遂卒年八十其徒尹志平等世奉璽書襲掌其教至大間加賜金印處機之四傳有曰祈祁志誠者居雲州金閤山道譽甚著丞相安童嘗過而問之志誠告以修身治世之要安童感其言故其相世祖也以清靜忠厚為主及罷還第退然若無與於世者人以為有得於志誠之言其後安童復被召入相辭不可遂往決於志誠志誠曰昔與子同列者何人今同列者何人安童悟入見世祖辭曰臣昔為宰相年尚少幸不失陛下事者丞佐皆臣所師友今事臣者皆進與臣俱則臣之為政能有加於前乎世祖曰誰為卿言是對曰祈祁真人世祖嘆異者久之正一天師者始自漢張道陵其後四代曰盛來居信之龍虎山相傳至三十六代宗演當至元十三年世祖已平江南遣使召之至則命廷臣郊勞待以客禮及見語之曰昔歲己未朕次鄂渚嘗令王一清往訪卿父卿父使報朕曰後二十年天下當混一神仙之言驗於今矣因命坐錫宴特賜玉芙蓉冠組金無縫服命主領江南道教仍賜銀印十八年二十五年再入覲世祖嘗命取其祖天師所傳玉印寶劍觀之語侍臣曰朝代更易已不知其幾而天師劍印傳子若孫尚至今日其果有神明之相矣乎嗟嘆久之二十九年卒子與棣嗣為三十七代襲掌江南道教三十一年入覲卒于京師元貞元年弟與材嗣為三十八代襲掌道教時潮嚙鹽官海鹽兩州為患特甚與材以術治之一夕大雷電以震明日見有物魚首龜形者磔于水裔潮患遂息大德五年召見于上都幄殿八年授正一教主主領三山符籙武宗即位來覲特授金紫光祿大夫封留國公錫金印仁宗即位特賜寶冠組織文金之服延祐三年卒四年子嗣成嗣為三十九代襲領江南道教主領三山符籙如故其徒張留孫者字師漢信州貴溪人少時入龍虎山為道士有道人相之曰神仙宰相也至元十三年從天師張宗演入朝世祖與語稱旨遂留侍闕下世祖嘗親祠幄殿皇太子侍忽風雨暴至眾駭懼留孫禱之立止又嘗次日月山昭睿順聖皇后得疾危甚亟召留孫請禱既而后夢有朱衣長髯從甲士導朱輦白獸行草間者覺而異之以問留孫對曰甲士導輦獸者臣所佩法籙中將吏也朱衣長髯者漢祖天師也行草間者春時也殿下之疾其及春而瘳乎后命取所事畫像以進視之果夢中所見者帝后大悅即命留孫為天師留孫固辭不敢當乃號之上卿命尚方鑄寶劍以賜建崇真宮于兩京俾留孫居之專掌祠事十五年授玄教宗師錫銀印又特任其父信州路治中尋復陞江東道同知宣慰司事是時天下大定世祖思與民休息留孫待詔尚方因論黃老治道貴清淨聖人在宥天下之旨深契主衷及將以完澤為相命留孫筮之得同人之豫留孫進曰同人柔得位而進應乎乾君臣之合也豫利建侯命相之事也何吉如之願陛下勿疑及拜完澤天下果以為得賢相大德中加號玄教大宗師同知集賢院道教事且追封其三代皆魏國公官階品俱第一武宗立召見賜坐陞大真人知集賢院位大學士上尋又加特進進講老子推明謙讓之道及仁宗即位猶恒誦其言且諭近臣曰累朝舊德僅餘張上卿爾進開府儀同三司加號輔成贊化保運玄教大宗師刻玉為玄教大宗師印以賜至治元年十二月卒年七十四天曆元年追贈道祖神應德真君其徒吳全節嗣全節字成季饒州安仁人年十三學道于龍虎山至元二十四年至京師從留孫見世祖三十一年成宗至自朔方召見賜古琱玉蟠螭環一敕每歲侍從行幸所司給廬帳車馬衣服廩餼著為令大德十一年授玄教嗣師錫銀印視二品至大元年賜七寶金冠織金文之服三年贈其祖昭文館大學士封其父司徒饒國公母饒國太夫人名其所居之鄉曰榮祿里曰具慶至治元年留孫卒二年制授特進上卿玄教大宗師崇文弘道玄德真人總攝江淮荊襄等處道教知集賢院道教事玉印一銀印二并授之全節嘗代祀嶽瀆還成宗問曰卿所過郡縣有善治民者乎對曰臣過洛陽太守盧摯平易無為而民以安靖成宗曰吾憶其人即日召拜集賢學士成宗崩仁宗至自懷孟有狂士以危言訐翰林學士閻復者事叵測全節力為言于李孟孟以聞仁宗意解復告老而去當時以為朝廷得敬大臣體而不以口語傷賢者全節蓋有力焉全節雅好結士大夫無所不傾其交長者尤見親而敬推轂善類唯恐不盡其力至於振窮周急又未嘗以恩怨異其心當時以為頗有俠氣云全節卒年八十有二其徒夏文泳嗣真大道教者始自金季道士劉德仁之所立也其教以苦節危行為要而不妄取於人不苟侈於己者也五傳而至酈希誠成居燕城天寶宮見知憲宗始名其教曰真大道授希誠成太玄真人領教事內出冠服以賜仍給紫衣三十襲賜其從者至元五年世祖命其徒孫德福統轄諸路真大道錫銅章二十年改賜銀印二又三傳而至張志清清志其教益盛授演教大宗師凝神冲妙玄應真人志清清志事親孝尤耐辛苦制行堅峻東海珠牢山舊多虎志清清志往結茅居之虎皆避徙然頗為人害志清清志曰是吾奪其所也遂去之後居臨汾地大震城郭邑屋摧壓死者不可勝計獨志清清志所居裂為二無少損焉乃徧巡木石間聽呻吟聲救活者甚眾朝廷重其名給驛致之掌教事志清清志舍傳徒步至京師深居簡出人或不識其面貴人達官來見率告病伏臥內不起至於道德縉紳先生則納屣杖屨求見不以為難時人高其風至畫為圖以相傳焉太一教者始金天眷中道士蕭抱珍傳太一三元法籙之術因名其教曰太一四傳而至蕭輔道世祖在潛邸聞其名命史天澤召至和林賜對稱旨留居宮邸以老請授弟子李居壽掌其教事至元十一年建太一宮于兩京命居壽居之領祠事且禋祀六丁以繼太保劉秉忠之術十三年賜太一掌教宗師印十六年十月辛丑月直元辰敕居壽祠醮奏赤章于天凡五晝夜事畢居壽請間曰皇太子春秋鼎盛宜參預國政且又因典瑞董文忠以為言世祖喜曰行將及之其後詔太子參決朝政庶事皆先啟後聞者蓋居壽為之先也
