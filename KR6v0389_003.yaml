body:
  text: 諸夷傳扶南國在日南郡之南海西大灣中去日南可七千里在林邑西南三千餘里城去海五百里有大江廣十里西北流東入於海其國輪廣三千餘里土地汙下而平博氣候風俗大較與林邑同出金銀銅錫沉木香象牙孔翠五色鸚鵡其南界三千餘里有頓遜國在海崎上地方千里城去海十里有五王並屬扶南頓遜之東界通交州其西界接天竺安息徼外諸國往還交市所以然者頓遜回入海中千餘里漲海無崖岸船舶未曾得徑過也其市東西交會日有萬餘人珍物寶貨無所不有又有酒樹似安石榴采其花汁停甕中數日成酒頓遜之外大海洲中又有毗騫國去扶南八千里傳其王身長丈二頸長三尺一三自古來不死莫知其年王神聖國中人善惡及將來事王皆知之是以無敢欺者南方號曰長頸王國俗有室屋衣服噉粳米其人言語小異扶南有山出金金露生石上無所限也國法刑罪人並於王前噉其肉國內不受估客有往者亦殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人唯王不死扶南王數遣使與書相報答常遺扶南王純金五十人食器形如圓盤又如瓦塸名為多羅受五升又如碗者受一升王亦能作天竺書書可三千言説其宿命所由與佛經相似並論善事又傳扶南東界即大漲海海中有大洲洲上有諸薄國國東有馬五洲復東行漲海千餘里至自然大洲其上有樹生火中洲左近人剝取其皮紡績作布極得數尺以為手巾與焦麻無異而色微青黑若小垢汙則投火中復更精潔或作燈炷用之不知盡扶南國俗本裸體文身被髮不制衣裳以女人為王號曰柳葉年少壯健有似男子其南有徼國一四有事鬼神者字混填夢神賜之弓乘賈人舶入海混填晨起即詣廟於神樹下得弓便依夢乘船入海遂入扶南外邑柳葉人衆見舶至欲取之混填即張弓射其舶穿度一面矢及侍者柳葉大懼舉衆降混填混填乃教柳葉穿布貫頭形不復露遂治其國納柳葉為妻生子分王七邑其後王混盤況以詐力間諸邑令相疑阻因舉兵攻并之乃遣子孫中分治諸邑號曰小王盤況年九十餘乃死立中子盤盤以國事委其大將范蔓一五盤盤立三年死國人共舉蔓為王蔓勇健有權略復以兵威攻伐旁國咸服屬之自號扶南大王乃治作大船窮漲海攻屈都昆九稚典孫等十餘國開地五六千里次當伐金鄰國蔓遇疾遣太子金生代行蔓姊子旃一六時為二千人將因篡蔓自立遣人詐金生而殺之蔓死時有乳下兒名長在民間至年二十乃結國中壯士襲殺旃旃大將范尋又殺長而自立更繕治國內起觀閣遊戲之朝旦中晡三四見客民人以焦蔗龜鳥為禮國法無牢獄有罪者先齋戒三日乃燒斧極赤令訟者捧行七步又以金鐶雞卵投沸湯中令探取之若無實者手即焦爛有理者則不又於城溝中養鰐魚門外圈猛獸有罪者輒以餵猛獸及鰐魚魚獸不食為無罪三日乃放之鰐大者長二丈餘狀如鼉有四足喙長六七尺兩邊有齒利如刀劍常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有之吳時遣中郎康泰宣化從事朱應使於尋國國人猶裸唯婦人著貫頭泰應謂曰國中實佳但人褻露可怪耳尋始令國內男子著橫幅橫幅今干漫也大家乃截錦為之貧者乃用布晉武帝太康中尋始遣使貢獻穆帝升平元年王竺旃檀奉表獻馴象詔曰此物勞費不少駐令勿送其後王憍陳如本天竺婆羅門也有神語曰應王扶南憍陳如心悅南至盤盤扶南人聞之舉國欣戴迎而立焉復改制度用天竺法憍陳如死後王持梨陀跋摩宋文帝世奉表獻方物齊永明中王闍邪跋摩遣使貢獻天監二年跋摩復遣使送珊瑚佛像并獻方物詔曰扶南王憍陳如闍邪跋摩介居海表世纂南服厥誠遠著重譯獻賝宜蒙酬納班以榮號可安南將軍扶南王今其國人皆醜黑拳髮所居不穿井數十家共一池引汲之俗事天神天神以銅為像二面者四手四面者八手手各有所持或小兒或鳥獸或日月其王出入乘象嬪侍亦然王坐則偏踞翹膝垂左膝至地以白疊敷前設金盆香爐於其上國俗居喪則剃除鬚髮死者有四葬水葬則投之江流火葬則焚為灰燼土葬則瘞埋之鳥葬則棄之中野人性貪吝無禮義男女恣其奔隨十年十三年跋摩纍遣使貢獻其年死庶子留陀跋摩殺其嫡弟自立十六年遣使竺當抱老奉表貢獻十八年復遣使送天竺旃檀瑞像婆羅樹葉并獻火齊珠鬱金蘇合等香普通元年中大通二年大同元年纍遣使獻方物五年復遣使獻生犀又言其國有佛髮長一丈二尺詔遣沙門釋雲寶隨使往迎之先是三年八月高祖改造阿育王寺塔出舊塔下舍利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形案僧伽經云佛髮青而細猶如藕莖絲佛三昧經云我昔在宮沐頭以尺量髮長一丈二尺放已右旋還成蠡文則與高祖所得同也阿育王即鐵輪王王閻浮提一天下佛滅度後一日一夜役鬼神造八萬四千塔此即其一也吳時有尼居其地為小精舍孫綝尋毀除之塔亦同泯吳平後諸道人復於舊處建立焉晉中宗初渡江更修飾之至簡文咸安中使沙門安法師程造小塔未及成而亡弟子僧顯繼而修立至孝武太元九年上金相輪及承露其後西河離石縣有胡人劉薩何遇疾暴亡而心下猶暖其家未敢便殯經十日更蘇説云有兩吏見録向西北行不測遠近至十八地獄隨報重輕受諸楚毒見觀世音語云汝緣未盡若得活可作沙門洛下齊城丹陽會稽並有阿育王塔可往禮拜若壽終則不墮地獄語竟如墮高巖忽然醒寤因此出家名慧達遊行禮塔次至丹陽未知塔處乃登越城四望見長干里有異氣色因就禮拜果是阿育王塔所一七屢放光明由是定知必有舍利乃集衆就掘之入一丈得三石碑並長六尺中一碑有鐵函函中有銀函函中又有金函盛三舍利及爪髮各一枚髮長數尺即遷舍利近北對簡文所造塔西造一層塔十六年又使沙門僧尚伽為三層一八即高祖所開者也初穿土四尺得龍窟及昔人所捨金銀鐶釧叉鑷等諸雜寶物可深九尺許方至石磉磉下有石函函內有鐵壺以盛銀坩坩內有金鏤罌盛三舍利如粟粒大圓正光潔函內又有琉璃碗內得四舍利及髮爪爪有四枚並為沉香色至其月二十七日高祖又到寺禮拜設無得大會大赦天下是日以金鉢盛水泛舍利其最小者隱鉢不出高祖禮數十拜舍利乃於鉢內放光旋回久之乃當鉢中而止高祖問大僧正慧念今日見不可思議事不慧念答曰法身常住湛然不動高祖曰弟子欲請一舍利還臺供養至九月五日又於寺設無得大會遣皇太子王侯朝貴等奉迎是日風景明和京師傾屬觀者百數十萬人所設金銀供具等物並留寺供養并施錢一千萬為寺基業至四年九月十五日高祖又至寺設無得大會竪二剎各以金罌次玉罌重盛舍利及爪髮內七寶塔中又以石函盛寶塔分入兩剎下及王侯妃主百姓富室所捨金銀鐶釧等珍寶充積十一年十一月二日寺僧又請高祖於寺發般若經題爾夕二塔俱放光明敕鎮東將軍邵陵王綸製寺大功德碑文先是二年改造會稽鄮縣塔開舊塔出舍利遣光宅寺釋敬脫等四僧及舍人孫照暫迎還臺高祖禮拜竟即送還縣入新塔下此縣塔亦是劉薩何所得也晉咸和中丹陽尹高悝行至張侯橋見浦中五色光長數尺不知何怪乃令人於光處掊視之得金像未有光趺悝乃下車載像還至長干巷首牛不肯進悝乃令馭人任牛所之牛徑牽車至寺悝因留像付寺僧每至中夜常放光明又聞空中有金石之響經一歲捕魚人張係世於海口忽見有銅花趺浮出水上係世取送縣縣以送臺乃施像足宛然合會簡文咸安元年交州合浦人董宗之採珠沒水於底得佛光豔交州押送臺以施像又合焉自咸和中得像至咸安初歷三十餘年光趺始具初高悝得像後西域胡僧五人來詣悝曰昔於天竺得阿育王造像來至鄴下值胡亂埋像於河邊今尋覔失所五人嘗一夜俱夢見像曰己出江東為高悝所得悝乃送此五僧至寺見像噓欷涕泣像便放光照燭殿宇又瓦官寺慧邃欲模寫像形寺主僧尚慮虧損金色謂邃曰若能令像放光回身西向乃可相許慧邃便懇到拜請其夜像即轉坐放光回身西向明旦便許模之像趺先有外國書莫有識者後有三藏那求跋摩識之云是阿育王為第四女所造也及大同中出舊塔舍利敕市寺側數百家宅地以廣寺域造諸堂殿并瑞像周回閣等窮於輪奐焉其圖諸經變並吳人張繇運手繇丹青之工一時冠絶盤盤國宋文帝元嘉孝武孝建大明中並遣使貢獻大通元年其王使使奉表曰揚州閻浮提震旦天子萬善莊嚴一切恭敬猶如天淨無雲明耀滿目天子身心清淨亦復如是道俗濟濟並蒙聖王光化濟度一切永作舟航臣聞之慶善我等至誠敬禮常勝天子足下稽首問訊今奉薄獻願垂哀受中大通元年五月纍遣使貢牙像及塔并獻沉檀等香數十種六年八月復使送菩提國真舍利及畫塔并獻菩提樹葉詹糖等香丹丹國中大通二年其王遣使奉表曰一九伏承聖主至德仁治信重三寶佛法興顯衆僧殷集法事日盛威嚴整肅朝望國執慈愍蒼生八方六合莫不歸服化鄰諸天非可言喻不任慶善若暫奉見尊足謹奉送牙像及塔各二軀并獻火齊珠古貝雜香藥等二大同元年復遣使獻金銀琉璃雜寶香藥等物干陀利國在南海洲上其俗與林邑扶南略同出班布古貝檳榔檳榔特精好為諸國之極宋孝武世王釋婆羅那憐陀遣長史竺留陀獻金銀寶器天監元年其王瞿曇修跋陀羅以四月八日夢見一僧謂之曰中國今有聖主十年之後佛法大興汝若遣使貢奉敬禮則土地豐樂商旅百倍若不信我則境土不得自安修跋陀羅初未能信既而又夢此僧曰汝若不信我當與汝往觀之乃於夢中來至中國拜覲天子既覺心異之陀羅本工畫乃寫夢中所見高祖容質飾以丹青仍遣使并畫工奉表獻玉盤等物使人既至模寫高祖形以還其國比本畫則符同焉因盛以寶函日加禮敬後跋陀死子毗邪跋摩立十七年遣長史毗員跋摩奉表曰常勝天子陛下諸佛世尊常樂安樂六通三達為世間尊是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山邑居聚落次第羅滿城郭館宇如忉利天宮具足四兵能伏怨敵國土安樂無諸患難人民和善受化正法慶無不通猶處雪山流注雪水八味清淨百川洋溢周回屈曲順趨大海一切衆生咸得受用於諸國土殊勝第一是名震旦大梁揚都天子二一仁廕四海德合天心雖人是天降生護世功德寶藏救世大悲為我尊生威儀具足是故至誠敬禮天子足下稽首問訊奉獻金芙蓉雜香藥等願垂納受普通元年復遣使獻方物狼牙修國在南海中其界東西三十日行南北二十日行去廣州二萬四千里土氣物産與扶南略同偏多𥴈沉婆律香等其俗男女皆袒而被髮以古貝為干縵其王及貴臣乃加雲霞布覆胛以金繩為絡帶金鐶貫耳女子則被布以瓔珞繞身其國纍磚為城重門樓閣王出乘象有幡毦旗鼓罩白蓋兵衛甚設國人説立國以來四百餘年後嗣衰弱王族有賢者國人歸之王聞知乃加囚執其鎖無故自斷王以為神因不敢害乃斥逐出境遂奔天竺天竺妻以長女俄而狼牙王死大臣迎還為王二十餘年死子婆伽達多立天監十四年遣使阿撤多奉表曰大吉天子足下離淫怒癡哀愍衆生慈心無量端嚴相好身光明朗如水中月普照十方眉間白毫其白如雪其色照曜亦如月光諸天善神之所供養以垂正法寶梵行衆增莊嚴都邑城閣高峻如乾陀山樓觀羅列道途平正人民熾盛快樂安穩著種種衣猶如天服於一切國為極尊勝天王愍念羣生民人安樂慈心深廣律儀清淨正法化治供養三寶名稱宣揚布滿世界百姓樂見如月初生譬如梵王世界之主人天一切莫不歸依敬禮大吉天子足下猶如現前忝承先業慶嘉無量今遣使問訊大意欲自往復畏大海風波不達今奉薄獻願大家曲垂領納婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏穀一歲再熟草木常榮海出文螺紫貝有石名蚶貝羅初採之柔軟及刻削為物乾之遂大堅強其國人披古貝如帊及為都縵王乃用班絲布以瓔珞繞身頭著金冠高尺餘形如辨綴以七寶之飾帶金裝劍偏坐金高坐以銀蹬支足侍女皆為金花雜寶之飾或持白毦拂及孔雀扇王出以象駕輿輿以雜香為之上施羽蓋珠簾其導從吹螺擊鼓王姓憍陳如自古未通中國問其先及年數不能記焉而言白淨王夫人即其國女也天監十六年遣使奉表曰伏承聖王信重三寶興立塔寺校飾莊嚴周遍國土四衢平坦清淨無穢臺殿羅列狀若天宮壯麗微妙世無與等聖主出時四兵具足羽儀導從布滿左右都人士女麗服光飾市廛豐富充積珍寶王法清整無相侵奪學徒皆至三乘競集敷説正法雲布雨潤四海流通交會萬國長江眇漫清泠深廣有生咸資莫能消穢陰陽和暢災厲不作大梁揚都聖王無等臨覆上國有大慈悲子育萬民平等忍辱怨親無二加以周窮無所藏積靡不照燭如日之明無不受樂猶如淨月宰輔賢良羣臣貞信盡忠奉上心無異想伏惟皇帝是我真佛臣是婆利國主今敬稽首禮聖王足下惟願大王知我此心此心久矣非適今也山海阻遠無緣自達今故遣使獻金席等表此丹誠普通三年其王頻伽復遣使珠貝智貢白鸚鵡青蟲兜鍪琉璃器古貝螺杯雜香藥等數十種中天竺國在大月支東南數千里地方三萬里一名身毒漢世張騫使大夏見卭竹杖蜀布國人云市之身毒身毒即天竺蓋傳譯音字不同其實一也從月支高附以西南至西海東至槃越列國數十每國置王其名雖異皆身毒也漢時羈屬月支其俗土著與月支同而卑濕暑熱民弱畏戰弱於月支國臨大江名新陶源出昆崘分為五江總名曰恆水其水甘美下有真鹽色正白如水精土俗出犀象貂鼲玳瑁火齊金銀鐵金縷織成金皮罽細摩白疊好裘毾㲪火齊狀如雲母色如紫金有光耀別之則薄如蟬翼積之則如紗穀之重沓也其西與大秦安息交市海中多大秦珍物珊瑚琥珀金碧珠璣琅玕鬱金蘇合蘇合是合諸香汁煎之非自然一物也又云大秦人採蘇合先笮其汁以為香膏乃賣其滓與諸國賈人是以展轉來達中國不大香也鬱金獨出罽賓國華色正黃而細與芙蓉華裏被蓮者相似國人先取以上佛寺積日香稿乃糞去之賈人從寺中徵雇以轉賣與他國也漢桓帝延熹九年大秦王安敦遣使自日南徼外來獻漢世唯一通焉其國人行賈往往至扶南日南交趾其南徼諸國人少有到大秦者孫權黃武五年有大秦賈人字秦論來到交趾交趾太守吳邈遣送詣權權問方土謠俗論具以事對時諸葛恪討丹陽獲黝歙短人論見之曰大秦希見此人權以男女各十人差吏會稽劉咸送論咸於道物故論乃徑還本國漢和帝時天竺數遣使貢獻後西域反叛遂絶至桓帝延熹二年四年頻從日南徼外來獻魏晉世絶不復通唯吳時扶南王范旃遣親人蘇物使其國從扶南發投拘利口循海大灣中正西北入歷灣邊數國可一年餘到天竺江口逆水行七千里乃至焉天竺王驚曰海濱極遠猶有此人即呼令觀視國內仍差陳宋等二人以月支馬四匹報旃遣物等還積四年方至其時吳遣中郎康泰使扶南及見陳宋等具問天竺土俗云佛道所興國也人民敦厖土地饒沃其王號茂論所都城郭水泉分流繞于渠塹下注大江其宮殿皆雕文鏤刻街曲市里屋舍樓觀鐘鼓音樂服飾香華水陸通流百賈交會奇玩珍瑋恣心所欲左右嘉維舍衛葉波等十六大國去天竺或二三千里共尊奉之以為在天地之中也天監初其王屈多遣長史竺羅達奉表曰伏聞彼國據江傍海山川周固衆妙悉備莊嚴國土猶如化城宮殿莊飾街巷平坦人民充滿歡娛安樂大王出遊四兵隨從聖明仁愛不害衆生國中臣民循行正法大王仁聖化之以道慈悲羣生無所遺棄常修淨戒式導不及無上法船沉溺以濟百官氓庶受樂無恐諸天護持萬神侍從天魔降服莫不歸仰王身端嚴如日初出仁澤普潤猶如大雲於彼震旦最為殊勝臣之所住國土首羅天守護令國安樂王王相承未曾斷絶國中皆七寶形像衆妙莊嚴臣自修檢如化王法臣名屈多奕世王種惟願大王聖體和平今以此國羣臣民庶山川珍重一切歸屬五體投地歸誠大王使人竺達多由來忠信是故今遣大王若有所須珍奇異物悉當奉送此之境土便是大王之國王之法令善道悉當承用願二國信使往來不絶此信返還願賜一使具宣聖命備勑所宜款至之誠望不空返所白如允願加採納今奉獻琉璃唾壺雜香古貝等物師子國天竺旁國也其地和適無冬夏之異五穀隨人所種不須時節其國舊無人民止有鬼神及龍居之諸國商估來共市易鬼神不見其形但出珍寶顯其所堪價商人依價取之諸國人聞其土樂因此競至或有停住者遂成大國晉義熙初始遣獻玉像經十載乃至像高四尺二寸玉色潔潤形製殊特殆非人工此像歷晉宋世在瓦官寺寺先有徵士戴安道手製佛像五軀及顧長康維摩畫圖世人謂為三絶至齊東昏遂毀玉像前截臂次取身為嬖妾潘貴妃作叉釧宋元嘉六年十二年其王剎利摩訶遣使貢獻大通元年後王伽葉伽羅訶梨邪使奉表曰謹白大梁明主雖山海殊隔而音信時通伏承皇帝道德高遠覆載同於天地明照齊乎日月四海之表無有不從方國諸王莫不奉獻以表慕義之誠或泛海三年陸行千日畏威懷德無遠不至我先王以來唯以修德為本不嚴而治奉事正法道天下欣人為善慶若己身欲與大梁共弘三寶以度難化信還伏聽告敕今奉薄獻願垂納受東夷之國朝鮮為大得箕子之化其器物猶有禮樂云魏時朝鮮以東馬韓辰韓之屬世通中國自晉過江泛海東使有高句驪百濟而宋齊間常通職貢梁興又有加焉扶桑國在昔未聞也普通中有道人稱自彼而至其言元本尤悉故并録焉高句驪者其先出自東明東明本北夷橐離王之子離王出行其侍兒於後任娠離王還欲殺之侍兒曰前見天上有氣如大雞子來降我因以有娠王囚之後遂生男王置之豕牢豕以口氣噓之不死王以為神乃聽收養長而善射王忌其猛復欲殺之東明乃奔走南至淹滯水二二以弓擊水魚鱉皆浮為橋東明乘之得渡至夫餘而王焉其後支別為句驪種也其國漢之玄菟郡也在遼東之東去遼東千里漢魏世南與朝鮮穢貃東與沃沮北與夫餘接漢武帝元封四年滅朝鮮置玄菟郡以高句驪為縣以屬之句驪地方可二千里中有遼山遼水所出其王都於丸都之下多大山深谷無原澤百姓依之以居食澗水雖土著無良田故其俗節食好治宮室於所居之左立大屋祭鬼神又祠零星社稷人性凶急喜寇抄其官有相加對盧沛者古鄒加主簿優台使者皂衣先人尊卑各有等級言語諸事多與夫餘同其性氣衣服有異本有五族有消奴部絶奴部順奴部二三雚奴部桂婁部本消奴部為王微弱桂婁部代之漢時賜扶桑國者齊永元元年其國有沙門慧深來至荊州説云扶桑在大漢國東二萬餘里地在中國之東其土多扶桑木故以為名扶桑葉似桐而初生如笋國人食之實如梨而赤績其皮為布以為衣亦以為綿作板屋無城郭有文字以扶桑皮為紙無兵甲不攻戰其國法有南北獄若犯輕者入南獄重罪者入北獄有赦則赦南獄不赦北獄在北獄者男女相配生男八歲為奴生女九歲為婢犯罪之身至死不出貴人有罪國乃大會坐罪人於坑對之宴飲分訣若死別焉以灰繞之其一重則一身屏退二重則及子孫三重則及七世名國王為乙祁貴人第一者為大對盧第二者為小對盧第三者為納咄沙國王行有鼓角導從其衣色隨年改易甲乙年青丙丁年赤戊己年黃庚辛年白壬癸年黑有牛角甚長以角載物至勝二十斛車有馬車牛車鹿車國人養鹿如中國畜牛以乳為酪有桑梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻壻往女家門外作屋晨夕灑掃經年而女不悅即驅之相悅乃成婚婚禮大抵與中國同親喪七日不食祖父母喪五日不食兄弟伯叔姑姊妹三日不食設靈為神像朝夕拜奠不制縗絰嗣王立三年不視國事其俗舊無佛法宋大明二年罽賓國嘗有比丘五人遊行至其國流通佛法經像教令出家風俗遂改慧深又云扶桑東千餘里有女國容貌端正色甚潔白身體有毛髮長委地至二三月競入水則任娠六七月産子女人胸前無乳項後生毛根白毛中有汁以乳子一百日能行三四年則成人矣見人驚避偏畏丈夫食鹹草如禽獸鹹草葉似邪蒿而氣香味鹹天監六年有晉安人渡海為風所飄至一島登岸有人居止女則如中國而言語不可曉男則人身而狗頭其聲如吠其食有小豆其衣如布築土為墻其形圓其戶如竇云西北諸戎漢世張騫始發西域之迹甘英遂臨西海或遣侍子或奉貢獻于時雖窮兵極武僅而克捷比之前代其略遠矣魏時三方鼎跱日事干戈晉氏平吳以後少獲寧息徒置戊己之官諸國亦未賓從也繼以中原喪亂胡人遞起西域與江東隔礙重譯不交呂光之涉龜茲亦猶蠻夷之伐蠻夷非中國之意也自是諸國分并勝負強弱難得詳載明珠翠羽雖仞於後宮蒲梢龍文希入於外署有梁受命其奉正朔而朝闕庭者則仇池宕昌高昌鄧至河南龜茲于闐滑諸國焉今綴其風俗為西北戎傳云
