body:
  text: 釋老志十第二十大人有作司牧生民結繩以往書契所絶故靡得而知焉自羲軒已還至於三代其神言祕策蘊圖緯之文範世率民垂墳典之迹秦肆其毒滅於灰燼漢採遺籍復若丘山司馬遷區別異同有陰陽儒墨名法道德六家之義劉歆著七略班固志藝文釋氏之學所未曾紀案漢武元狩中遣霍去病討胸奴至臯蘭過居延斬首大獲昆邪王殺休屠王將其衆五萬來降獲其金人帝以為大神列於甘泉宮金人率長丈餘不祭祀但燒香禮拜而已此則佛道流通之漸也及開西域遣張騫使大夏還傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元壽元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中土聞之未之信了也後孝明帝夜夢金人項有日光飛行殿庭乃訪羣臣傅毅始以佛對帝遣郎中蔡愔博士弟子秦景等使於天竺寫浮屠遺範愔仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門及跪拜之法自此始也愔又得佛經四十二章及釋迦立像明帝令畫工圖佛像置清涼臺及顯節陵上經緘於蘭臺石室愔之還也以白馬負經而至漢因立白馬寺於洛城雍門西摩騰法蘭咸卒於此寺浮屠正號曰佛陀佛陀與浮圖聲相近皆西方言其來轉為二音華言譯之則謂淨覺言滅穢成明道為聖悟凡其經旨大抵言生生之類皆因行業而起有過去當今未來歷三世識神常不滅凡為善惡必有報應漸積勝業陶冶粗鄙經無數形澡練神明乃致無生而得佛道其間階次心行等級非一皆緣淺以至深藉微而為著率在於積仁順蠲嗜欲習虛靜而成通照也故其始修心則依佛法僧謂之三歸若君子之三畏也又有五戒去殺盜淫妄言飲酒大意與仁義禮智信同名為異耳云奉持之則生天人勝處虧犯則墜鬼畜諸苦又善惡生處凡有六道焉諸服其道者則剃落鬚髮釋纍辭家結師資遵律度相與和居治心修淨行乞以自給謂之沙門或曰桑門亦聲相近總謂之僧皆胡言也僧譯為和命衆桑門為息心比丘為行乞俗人之信憑道法者男曰優婆塞女曰優婆夷其為沙門者初修十誡曰沙彌而終於二百五十則具足成大僧婦入道者曰比丘尼其誡至于五百皆以為本隨事增數在於防心攝身正口心去貪忿癡身除殺淫盜口斷妄雜諸非正言總謂之十善道能具此謂之三業清淨凡人修行粗為極云可以達惡善報漸階聖迹初階聖者有三種人其根業各差謂之三乘聲聞乘緣覺乘大乘取其可乘運以至道為名此三人惡迹已盡但修心蕩纍濟物進德初根人為小乘行四諦法中根人為中乘受十二因緣上根人為大乘則修六度雖階三乘而要由修進萬行拯度億流彌歷長遠乃可登佛境矣所謂佛者本號釋迦文者譯言能仁謂德充道備堪濟萬物也釋迦前有六佛釋迦繼六佛而成道處今賢劫文言將來有彌勒佛方繼釋迦而降世釋迦即天竺迦維衛國王之子天竺其總稱迦維別名也初釋迦於四月八日夜從母右脅而生既生姿相超異者三十二種天降嘉瑞以應之亦三十二其本起經説之備矣釋迦生時當周莊王九年春秋魯莊公七年夏四月恆星不見夜明是也至魏武定八年凡一千二百三十七年云釋迦年三十成佛導化羣生四十九載乃於拘尸那城娑羅雙樹間以二月十五日而入般涅槃涅槃譯云滅度或言常樂我淨明無遷謝及諸苦纍也諸佛法身有二種義一者真實二者權應真實身謂至極之體妙絶拘纍不得以方處期不可以形量限有感斯應體常湛然權應身者謂和光六道同塵萬類生滅隨時修短應物形由感生體非實有權形雖謝真體不遷但時無妙感故莫得常見耳明佛生非實生滅非實滅也佛既謝世香木焚尸靈骨分碎大小如粒擊之不壞焚亦不燋或有光明神驗胡言謂之舍利弟子收奉置之寶瓶竭香花致敬慕建宮宇謂為塔塔亦胡言猶宗廟也故世稱塔廟於後百年有王阿育以神力分佛舍利役諸鬼神造八萬四千塔布於世界皆同日而就今洛陽彭城姑臧臨淄皆有阿育王寺蓋承其遺迹焉釋迦雖般涅槃而留影迹爪齒於天竺於今猶在中土來往並稱見之初釋迦所説教法既涅槃後有聲聞弟子大迦葉阿難等五百人撰集著録阿難親承囑授多聞總持蓋能綜核深致無所漏失乃綴文字撰載三藏十二部經如九流之異統其大歸終以三乘為本後數百年有羅漢菩薩相繼著論贊明經義以破外道摩訶衍大小阿毗曇中論十二門論百法論成實論等是也皆傍諸藏部大義假立外問而以內法釋之漢章帝時楚王英喜為浮屠齋戒遣郎中令奉黃縑白紈三十匹詣國相以贖愆詔報曰楚王尚浮屠之仁祠潔齋三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌因以班示諸國桓帝時襄楷言佛陀黃老道以諫欲令好生惡殺少嗜欲去奢泰尚無為魏明帝曾欲壞宮西佛圖外國沙門乃金盤盛水置於殿前以佛舍利投之於水乃有五色光起於是帝歎曰自非靈異安得爾乎遂徙於道東為作周閣百間佛圖故處鑿為濛泛池種芙蓉於中後有天竺沙門曇柯迦羅入洛宣譯誡律中國誡律之始也自洛中構白馬寺盛飾佛圖畫迹甚妙為四方式凡宮塔制度猶依天竺舊狀而重構之從一級至三五七九世人相承謂之浮圖或云佛圖晉世洛中佛圖有四十二所矣漢世沙門皆衣赤布後乃易以雜色晉元康中有胡沙門支恭明譯佛經維摩法華三本起等微言隱義未之能究後有沙門常山衛道安性聰敏日誦經萬餘言研求幽旨慨無師匠獨坐靜室十二年覃思構精神悟妙賾以前所出經多有舛駁乃正其乖謬石勒時有天竺沙門浮圖澄少於烏萇國就羅漢入道劉曜時到襄國後為石勒所宗信號為大和尚軍國規謨頗訪之所言多驗道安曾至鄴候澄澄見而異之澄卒後中國紛亂道安乃率門徒南遊新野欲令玄宗在所流布分遣弟子各趣諸方法汰詣揚州法和入蜀道安與慧遠之襄陽道安後入苻堅堅素欽德問既見宗以師禮時西域有胡沙門鳩摩羅什思通法門道安思與講釋每勸堅致羅什什亦承安令問謂之東方聖人或時遙拜致敬道安卒後二十餘載而羅什至長安恨不及安以為深慨道安所正經義與羅什譯出符會如一初無乖舛於是法旨大著中原魏先建國於玄朔風俗淳一無為以自守與西域殊絶莫能往來故浮圖之教未之得聞或聞而未信也及神元與魏晉通聘文帝久在洛陽昭成又至襄國乃備究南夏佛法之事太祖平中山經略燕趙所徑郡國佛寺見諸沙門道士皆致精敬禁軍旅無有所犯帝好黃老頗覽佛經但天下初定戎車屢動庶事草創未建圖宇招延僧衆也然時時旁求先是有沙門僧朗與其徒隱于泰山之琨谷帝遣使致書以繒素旃罽銀鉢為禮今猶號曰朗公谷焉天興元年下詔曰夫佛法之興其來遠矣濟益之功冥及存沒神蹤遺軌信可依憑其敕有司於京城建飾容範修整宮舍令信向之徒有所居止是歲始作五級佛圖耆闍崛山及須彌山殿加以繢飾別構講堂禪堂及沙門座莫不嚴具焉太宗踐位遵太祖之業亦好黃老又崇佛法京邑四方建立圖像仍令沙門敷導民俗初皇始中趙郡有沙門法果誡行精至開演法籍太祖聞其名詔以禮徵赴京師後以為道人統綰攝僧徒每與帝言多所愜允供施甚厚至太宗彌加崇敬永興中前後授以輔國宜城子忠信侯安成公之號皆固辭帝常親幸其居以門小狹不容輿輦更廣大之年八十餘泰常中卒未殯帝三臨其喪追贈老壽將軍趙胡靈公初法果每言太祖明睿好道即是當今如來沙門宜應盡禮遂常致拜謂人曰能鴻道者人主也我非拜天子乃是禮佛耳法果四十始為沙門有子曰猛詔令襲果所加爵帝後幸廣宗有沙門曇證年且百歲邀見於路奉致果物帝敬其年老志力不衰亦加以老壽將軍號是時鳩摩羅什為姚興所敬於長安草堂寺集義學八百人重譯經本羅什聰辨有淵思達東西方言時沙門道肜僧略道恆道褾僧肇曇影等與羅什共相提挈發明幽致諸深大經論十有餘部更定章句辭義通明至今沙門共所祖習道肜等皆識學洽通僧肇尤為其最羅什之撰譯僧肇常執筆定諸辭義注維摩經又著數論皆有妙旨學者宗之又沙門法顯慨律藏不具自長安遊天竺歷三十餘國隨有經律之處學其書語譯而寫之十年乃於南海師子國隨商人泛舟東下晝夜昏迷將二百日乃至青州長廣郡不其勞山南下乃出海焉是歲神瑞二年也法顯所徑諸國傳記之今行於世其所得律通譯未能盡正至江南更與天竺禪師跋陀羅辨定之謂之僧祇律大備于前為今沙門所持受先是有沙門法領從揚州入西域得華嚴經本定律後數年跋陀羅共沙門法業重加譯撰宣行於時世祖初即位亦遵太祖太宗之業每引高德沙門與共談論於四月八日輿諸佛像行於廣衢帝親御門樓臨觀散花以致禮敬先是沮渠蒙遜在涼州亦好佛法有罽賓沙門曇摩讖習諸經論於姑臧與沙門智嵩等譯涅槃諸經十餘部又曉術數禁呪歷言他國安危多所中驗蒙遜每以國事咨之神麚中帝命蒙遜送讖詣京師惜而不遣既而懼魏威責遂使人殺讖讖死之日謂門徒曰今時將有客來可早食以待之食訖而走使至時人謂之知命智嵩亦爽悟篤志經籍後乃以新出經論於涼土教授辨論幽旨著涅槃義記戒行峻整門人齊肅知涼州將有兵役與門徒數人欲往胡地道路飢饉絶糧積日弟子求得禽獸肉請嵩強食嵩以戒自誓遂餓死於酒泉之西山弟子積薪焚其尸骸骨灰燼唯舌獨全色狀不變時人以為誦説功報涼州自張軌後世信佛教敦煌地接西域道俗交得其舊式村塢相屬多有塔寺太延中涼州平徙其國人於京邑沙門佛事皆俱東象教彌增矣尋以沙門衆多詔罷年五十已下者世祖初平赫連昌得沙門惠始姓張家本清河聞羅什出新經遂詣長安見之觀習經典坐禪於白渠北晝則入城聽講夕則還處靜坐三輔有識多宗之劉裕滅姚泓留子義真鎮長安義真及僚佐皆敬重焉義真之去長安也赫連屈丐追敗之道俗少長咸見坑戮惠始身被白刃而體不傷衆大怪異言於屈丐屈丐大怒召惠始於前以所持寶劍擊之又不能害乃懼而謝罪統萬平惠始到京都多所訓導時人莫測其迹世祖甚重之每加禮敬始自習禪至於沒世稱五十餘年未嘗寢臥或時跣行雖履泥塵初不汙足色愈鮮白世號之曰白腳師太延中臨終於八角寺齊潔端坐僧徒滿側凝泊而絶停尸十餘日坐既不改容色如一舉世神異之遂瘞寺內至真君六年制城內不得留瘞乃葬於南郊之外始死十年矣開殯儼然初不傾壞送葬者六千餘人莫不感慟中書監高允為其傳頌其德迹惠始冢上立石精舍圖其形像經毀法時猶自全立世祖即位富於春秋既而鋭志武功每以平定禍亂為先雖歸宗佛法敬重沙門而未存覽經教深求緣報之意及得寇謙之道帝以清淨無為有仙化之證遂信行其術時司徒崔浩博學多聞帝每訪以大事浩奉謙之道尤不信佛與帝言數加非毀常謂虛誕為世費害帝以其辨博頗信之會蓋吳反杏城關中騷動帝乃西伐至於長安先是長安沙門種麥寺內御騶牧馬於麥中帝入觀馬沙門飲從官酒從官入其便室見大有弓矢矛盾出以奏聞帝怒曰此非沙門所用當與蓋吳通謀規害人耳命有司案誅一寺閲其財産大得釀酒具及州郡牧守富人所寄藏物蓋以萬計又為屈室與貴室女私行淫亂帝既忿沙門非法浩時從行因進其説詔誅長安沙門焚破佛像敕留臺下四方令一依長安行事又詔曰彼沙門者假西戎虛誕妄生妖孽非所以一齊政化布淳德於天下也自王公已下有私養沙門者皆送官曹不得隱匿限今年二月十五日過期不出沙門身死容止者誅一門時恭宗為太子監國素敬佛道頻上表陳刑殺沙門之濫又非圖像之罪今罷其道杜諸寺門世不修奉土木丹青自然毀滅如是再三不許乃下詔曰昔後漢荒君信惑邪偽妄假睡夢事胡妖鬼以亂天常自古九州之中無此也夸誕大言不本人情叔季之世暗君亂主莫不眩焉由是政教不行禮義大壞鬼道熾盛視王者之法蔑如也自此以來代經亂禍天罰亟行生民死盡五服之內鞠為丘墟千里蕭條不見人迹皆由於此朕承天緒屬當窮運之弊欲除偽定真復羲農之治其一切蕩除胡神滅其蹤迹庶無謝於風氏矣自今以後敢有事胡神及造形像泥人銅人者門誅雖言胡神問今胡人共云無有皆是前世漢人無賴子弟劉元真呂伯強之徒接乞胡之誕言用老莊之虛假附而益之皆非真實至使王法廢而不行蓋大姦之魁也有非常之人然後能行非常之事非朕孰能去此歷代之偽物有司宣告征鎮諸軍刺史諸有佛圖形像及胡經盡皆擊破焚燒沙門無少長悉坑之是歲真君七年三月也恭宗言雖不用然猶緩宣詔書遠近皆豫聞知得各為計四方沙門多亡匿獲免在京邑者亦蒙全濟金銀寶像及諸經論大得祕藏而土木宮塔聲教所及莫不畢毀矣始謙之與浩同從車駕苦與浩諍浩不肯謂浩曰卿今促年受戮滅門戶矣後四年浩誅備五刑時年七十浩既誅死帝頗悔之業已行難中修復恭宗潛欲興之未敢言也佛淪廢終帝世積七八年然禁稍寬弛篤信之家得密奉事沙門專至者猶竊法服誦習焉唯不得顯行於京都矣先是沙門曇曜有操尚又為恭宗所知禮佛法之滅沙門多以餘能自效還俗求見曜誓欲守死恭宗親加勸喻至於再三不得已乃止密持法服器物不暫離身聞者歎重之高宗踐極下詔曰夫為帝王者必祗奉明靈顯彰仁道其能惠著生民濟益群品者雖在古昔猶序其風烈是以春秋嘉崇明之禮祭典載功施之族況釋迦如來功濟大千惠流塵境等生死者歎其達觀覽文義者貴其妙明助王政之禁律益仁智之善性排斥群邪開演正覺故前代已來莫不崇尚亦我國家常所尊事也世祖太武皇帝開廣邊荒德澤遐及沙門道士善行純誠惠始之倫無遠不至風義相感往往如林夫山海之深怪物多有姦淫之徒得容假託講寺之中致有凶黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然值軍國多事未遑修復朕承洪緒君臨萬邦思述先志以隆斯道今制諸州郡縣於衆居之所各聽建佛圖一區任其財用不制會限其好樂道法欲為沙門不問長幼出於良家性行素篤無諸嫌穢鄉里所明者聽其出家率大州五十小州四十人其郡遙遠臺者十人各當局分皆足以化惡就善播揚道教也天下承風朝不及夕往時所毀圖寺仍還修矣佛像經論皆復得顯京師沙門師賢本罽賓國王種人少入道東遊涼城涼平赴京罷佛法時師賢假為醫術還俗而守道不改於修復日即反沙門其同輩五人帝乃親為下髮師賢仍為道人統是年詔有司為石像令如帝身既成顏上足下各有黑石冥同帝體上下黑子論者以為純誠所感興光元年秋敕有司於五級大寺內為太祖已下五帝鑄釋迦立像五各長一丈六尺都用赤金二十五萬斤太安初有師子國胡沙門邪奢遺多浮陀難提等五人奉佛像三到京都皆云備歷西域諸國見佛影迹及肉髻外國諸王相承咸遣工匠摹寫其容莫能及難提所造者去十餘步視之炳然轉近轉微又沙勒胡沙門赴京師致佛鉢并畫像迹和平初師賢卒曇曜代之更名沙門統初曇曜以復佛法之明年自中山被命赴京值帝出見于路御馬前銜曜衣時以為馬識善人帝後奉以師禮曇曜白帝於京城西武州塞鑿山石壁開窟五所鐫建佛像各一高者七十尺次六十尺雕飾奇偉冠於一世曇曜奏平齊戶及諸民有能歲輸穀六十斛入僧曹者即為僧祇戶粟為僧祇粟至於儉歲賑給飢民又請民犯重罪及官奴以為佛圖戶以供諸寺掃灑歲兼營田輸粟高宗並許之於是僧祇戶粟及寺戶遍於州鎮矣曇曜又與天竺沙門常那邪舍等譯出新經十四部又有沙門道進僧超法存等並有名於時演唱諸異顯祖即位敦信尤深覽諸經論好老莊每引諸沙門及能談玄之士與論理要初高宗太安末劉駿於丹陽中興寺設齋有一沙門容止獨秀舉衆往目皆莫識焉沙門惠璩起問之答名惠明又問所住答云從天安寺來語訖忽然不見駿君臣以為靈感改中興為天安寺是後七年而帝踐祚號天安元年是年劉彧徐州刺史薛安都始以城地來降明年盡有淮北之地其歲高祖誕載於時起永寧寺構七級佛圖高三百餘尺基架博敞為天下第一又於天宮寺造釋迦立像高四十三尺用赤金十萬斤黃金六百斤皇興中又構三級石佛圖榱棟楣楹上下重結大小皆石高十丈鎮固巧密為京華壯觀高祖踐位顯祖移御北苑崇光宮覽習玄籍建鹿野佛圖於苑中之西山去崇光右十里巖房禪堂禪僧居其中焉延興二年夏四月詔曰比丘不在寺舍遊涉村落交通姦猾經歷年歲令民間五五相保不得容止無籍之僧精加隱括有者送付州鎮其在畿郡送付本曹若為三寶巡民教化者在外齎州鎮維那文移在臺者齎都維那等印牒然後聽行違者加罪又詔曰內外之人興建福業造立圖寺高敞顯博亦足以輝隆至教矣然無知之徒各相高尚貧富相競費竭財産務存高廣傷殺昆蟲含生之類苟能精致纍土聚沙福鍾不朽欲建為福之因未知傷生之業朕為民父母慈養是務自今一切斷之又詔曰夫信誠則應遠行篤則感深歷觀先世靈瑞乃有禽獸易色草木移性濟州東平郡靈像發輝變成金銅之色殊常之事絶於往古熙隆妙法理在當今有司與沙門統曇曜令州送像達都使道俗咸覩實相之容普告天下皆使聞知三年十二月顯祖因田鷹獲鴛鴦一其偶悲鳴上下不去帝乃惕然問左右曰此飛鳴者為雌為雄左右對曰臣以為雌帝曰何以知對曰陽性剛陰性柔以剛柔推之必是雌矣帝乃慨然而歎曰雖人鳥事別至於資識性情竟何異哉於是下詔禁斷鷙鳥不得畜焉承明元年八月高祖於永寧寺設太法供度良家男女為僧尼者百有餘人帝為剃髮施以僧服令修道戒資福於顯祖是月又詔起建明寺太和元年二月幸永寧寺設齋赦死罪囚三月又幸永寧寺設會行道聽講命中祕二省與僧徒討論佛義施僧衣服寶器有差又於方山太祖營壘之處建思遠寺自興光至此京城內寺新舊且百所僧尼二千餘人四方諸寺六千四百七十八僧尼七萬七千二百五十八人四年春詔以鷹師為報德寺九年秋有司奏上谷郡比丘尼惠香在北山松樹下死尸形不壞爾來三年士女觀者有千百於時人皆異之十年冬有司又奏前被敕以勒籍之初愚民僥幸假稱入道以避輸課其無籍僧尼罷遣還俗重被旨所檢僧尼寺主維那當寺隱審其有道行精勤者聽仍在道為行凡粗者有籍無籍悉罷歸齊民今依旨簡遣其諸州還俗者僧尼合一千三百二十七人奏可十六年詔四月八日七月十五日聽大州度一百人為僧尼中州五十人下州二十人以為常準著於令十七年詔立僧制四十七條十九年四月帝幸徐州白塔寺顧謂諸王及侍官曰此寺近有名僧嵩法師受成實論於羅什在此流通後授淵法師淵法師授登紀二法師朕每玩成實論可以釋人染情故至此寺焉時沙門道登雅有義業為高祖眷賞恆侍講論曾於禁內與帝夜談同見一鬼二十年卒高祖甚悼惜之詔施帛一千匹又設一切僧齋并命京城七日行道又詔朕師登法師奄至徂背痛怛摧慟不能已已比藥治慎喪未容即赴便準師義哭諸門外緇素榮之又有西域沙門名跋陀有道業深為高祖所敬信詔於少室山陰立少林寺而居之公給衣供二十一年五月詔曰羅什法師可謂神出五才志入四行者也今常住寺猶有遺地欽悅修蹤情深遐遠可於舊堂所為建三級浮圖又見逼昏虐為道殄軀既暫同俗禮應有子胤可推訪以聞當加敘接先是立監福曹又改為昭玄備有官屬以斷僧務高祖時沙門道順惠覺僧意惠紀僧範道辨惠度智誕僧顯僧義僧利並以義行知重世宗即位永平元年秋詔曰緇素既殊法律亦異故道教彰於互顯禁勸各有所宜自今已後衆僧犯殺人已上罪者仍依俗斷餘犯悉付昭玄以內律僧制治之二年冬沙門統惠深上言僧尼浩曠清濁混流不遵禁典精粗莫別輒與經律法師群議立制諸州鎮郡維那上坐寺主各令戒律自修咸依內禁若不解律者退其本次又出家之人不應犯法積八不淨物然經律所制通塞有方依律車牛淨人不淨之物不得為己私畜唯有老病年六十以上者限聽一乘又比來僧尼或因三寶出貸私財緣州外又出家捨著本無凶儀不應廢道從俗其父母三師遠聞凶問聽哭三日若在見前限以七日或有不安寺舍遊止民間亂道生過皆由此等若有犯者脫服還民其有造寺者限僧五十以上啓聞聽造若有輒營置者處以違敕之罪其寺僧衆擯出外州僧尼之法不得為俗人所使若有犯者還配本屬其外國僧尼來歸化者求精檢有德行合三藏者聽住若無德行遣還本國若其不去依此僧制治罪詔從之先是於恆農荊山造珉玉丈六像一三年冬迎置於洛濱之報德寺世宗躬觀致敬四年夏詔曰僧祇之粟本期濟施儉年出貸豐則收入山林僧尼隨以給施民有窘弊亦即賑之但主司冒利規取贏息及其徵責不計水旱或償利過本或翻改券契侵蠹貧下莫知紀極細民嗟毒歲月滋深非所以矜此窮乏宗尚慈拯之本意也自今已後不得專委維那都尉可令刺史共加監括尚書檢諸有僧祇穀之處州別列其元數出入贏息賑給多少并貸償歲月見在未收上臺録記若收利過本及翻改初券依律免之勿復徵責或有私債轉施償僧即以丐民不聽收檢後有出貸先盡貧窮徵債之科一準舊格富有之家不聽輒貸脫仍冒濫依法治罪又尚書令高肇奏言謹案故沙門統曇曜昔於承明元年奏涼州軍戶趙苟子等二百家為僧祇戶立課積粟擬濟飢年不限道俗皆以拯施又依內律僧祇戶不得別屬一寺而都維那僧暹僧頻等進違成旨退乖內法肆意任情奏求逼召致使吁嗟之怨盈於行道棄子傷生自縊溺死五十餘人豈是仰贊聖明慈育之意深失陛下歸依之心遂令此等行號巷哭叫訴無所至乃白羽貫耳列訟宮闕悠悠之人尚為哀痛況慈悲之士而可安之請聽苟子等還鄉課輸儉乏之年周給貧寡若有不虞以擬邊捍其暹等違旨背律謬奏之愆請付昭玄依僧律推處詔曰暹等特可原之餘如奏世宗篤好佛理每年常於禁中親講經論廣集名僧標明義旨沙門條録為內起居焉上既崇之下彌企尚至延昌中天下州郡僧尼寺積有一萬三千七百二十七所徒侶逾衆熙平元年詔遣沙門惠生使西域採諸經律正光三年冬還京師所得經論一百七十部行於世二年春靈太后令曰年常度僧依限大州應百人者州郡於前十日解送三百人其中州二百人小州一百人州統維那與官及精練簡取充數若無精行不得濫採若取非人刺史為首以違旨論太守縣令綱僚節級連坐統及維那移五百里外異州為僧自今奴婢悉不聽出家諸王及親貴亦不得輒啓請有犯者以違旨論其僧尼輒度他人奴婢者亦移五百里外為僧僧尼多養親識及他人奴婢子年大私度為弟子自今斷之有犯還俗被養者歸本等寺主聽容一人出寺五百里二人千里私度之僧皆由三長罪不及己容多隱濫自今有一人私度皆以違旨論鄰長為首里黨各相降一等縣滿十五人郡滿三十人州鎮滿三十人免官僚吏節級連坐私度之身配當州下役時法禁寬褫不能改肅也景明初世宗詔大長秋卿白整準代京靈巖寺石窟於洛南伊闕山為高祖文昭皇太后營石窟二所初建之始窟頂去地三百一十尺至正始二年中始出斬山二十三丈至大長秋卿王質謂斬山太高費功難就奏求下移就平去地一百尺南北一百四十尺永平中中尹劉騰奏為世宗復造石窟一凡為三所從景明元年至正光四年六月已前用功八十萬二千三百六十六肅宗熙平中於城內太社西起永寧寺靈太后親率百僚表基立剎佛圖九層高四十餘丈其諸費用不可勝計景明寺佛圖亦其亞也至於官私寺塔其數甚衆神龜元年冬司空公尚書令任城王澄奏曰仰惟高祖定鼎嵩瀍卜世悠遠慮括終始制洽天人造物開符垂之萬葉故都城制云城內唯擬一永寧寺地郭內唯擬尼寺一所餘悉城郭之外欲令永遵此制無敢踰矩逮景明之初微有犯禁故世宗仰修先志爰發明旨城內不造立浮圖僧尼寺舍亦欲絶其希覬文武二帝豈不愛尚佛法蓋以道俗殊歸理無相亂故也但俗眩虛聲僧貪厚潤雖有顯禁猶自冒營至正始三年沙門統惠深有違景明之禁便云營就之寺不忍移毀求自今已後更不聽立先旨含寬抑典從請前班之詔仍卷不行後來私謁彌以奔競永平二年深等復立條制啓云自今已後欲造寺者限僧五十已上聞徹聽造若有輒營置者依俗違敕之罪其寺僧衆擯出外州爾來十年私營轉盛罪擯之事寂爾無聞豈非朝格雖明恃福共毀僧制徒立顧利莫從者也不俗不道務為損法人而無厭其可極乎夫學迹沖妙非浮識所辨玄門曠寂豈短辭能究然淨居塵外道家所先功緣冥深匪尚華遁苟能誠信童子聚沙可邁於道場純陀儉設足薦於雙樹何必縱其盜竊資營寺觀此乃民之多幸非國之福也然比日私造動盈百數或乘請公地輒樹私福或啓得造寺限外廣制如此欺罔非可稍計臣以才劣誠忝工務奉遵成規裁量是總所以披尋舊旨研究圖格輒遣府司馬陸昶屬崔孝芬都城之中及郭邑之內檢括寺舍數乘五百空地表剎未立塔宇不在其數民不畏法乃至於斯自遷都已來年踰二紀寺奪民居三分且一高祖立制非徒欲使緇素殊途抑亦防微深慮世宗述之亦不錮禁營福當在杜塞未萌今之僧寺無處不有或比滿城邑之中或連溢屠沽之肆或三五少僧共為一寺梵唱屠音連簷接響像塔纏於腥臊性靈沒於嗜欲真偽混居往來紛雜下司因習而莫非僧曹對制而不問其於汙染真行塵穢練僧薰蕕同器不亦甚歟往在北代有法秀之謀近日冀州遭大乘之變皆初假神教以惑衆心終設姦誑用逞私悖太和之制因法秀而杜遠景明之禁慮大乘之將亂始知祖宗睿聖防遏處深履霜堅冰不可不慎昔如來闡教多依山林今此僧徒戀著城邑豈湫隘是經行所宜浮喧必栖禪之宅當由利引其心莫能自止處者既失其真造者或損其福乃釋氏之糟粳法中之社鼠內戒所不容王典所應棄矣非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅有傷慈矜用長嗟苦且人心不同善惡亦異或有栖心真趣道業清遠者或外假法服內懷悖德者如此之徒宜辨涇渭若雷同一貫何以勸善然覩法贊善凡人所知矯俗避嫌物情同趣臣獨何為孤議獨發誠以國典一廢追理至難法綱暫失條綱將亂是以冒陳愚見兩願其益臣聞設令在於必行立罰貴能肅物令而不行不如無令罰不能肅孰與亡罰頃明詔屢下而造者更滋嚴限驟施而違犯不息者豈不以假福託善幸罪不加人殉其私吏難苟劾前制無追往之辜後旨開自今之恕悠悠世情遂忽成法今宜加以嚴科特設重禁糾其來違懲其往失脫不峻檢方垂容借恐今旨雖明復如往日又旨令所斷標榜禮拜之處悉聽不禁愚以為樹榜無常禮處難驗欲云有造立榜證公須營之辭指言嘗禮如此則徒有禁名實通造路且徙御已後斷詔四行而私造之徒不懼制旨豈是百官有司怠於奉法將由網漏禁寬容託有他故耳如臣愚意都城之中雖有標榜營造粗功事可改立者請依先制在於郭外任擇所便其地若買得券證分明者聽其轉之若官地盜作即令還官若靈像既成不可移撤請依今敕如舊不禁悉令坊內行止不聽毀坊開門以妨里內通巷若被旨者不在斷限郭內準此商量其廟像嚴立而逼近屠沽請斷旁屠殺以潔靈居雖有僧數而事在可移者令就間敞以避隘陋如今年正月赦後造者求依僧制案法科治若僧不滿五十者共相通容小就大寺必令充限其地賣還一如上式自今外州若欲造寺僧滿五十已上先令本州表列昭玄量審奏聽乃立若有違犯悉依前科州郡已下容而不禁罪同違旨庶仰遵先皇不朽之業俯奉今旨慈悲之令則繩墨可全聖道不墜矣奏可未幾天下喪亂加以河陰之酷朝士死者其家多捨居宅以施僧尼京邑第舍略為寺矣前日禁令不復行焉元象元年秋詔曰梵境幽玄義歸清曠伽藍淨土理絶囂塵前朝城內先有禁斷自聿來遷鄴率由舊章而百辟士民屆都之始城外新城並皆給宅舊城中暫時普借更擬後須非為永久如聞諸人多以二處得地或捨舊城所借之宅擅立為寺知非己有假此一名終恐因習滋甚有虧恆式宜付有司精加隱括且城中舊寺及宅並有定帳其新立之徒悉從毀廢冬又詔天下牧守令長悉不聽造寺若有違者不問財之所出并計所營功庸悉以枉法論興和二年春詔以鄴城舊宮為天平寺世宗以來至武定末沙門知名者有惠猛惠辨惠深僧暹道欽僧獻道晞僧深惠光惠顯法榮道長並見重於當世魏有天下至於禪讓佛經流通大集中國凡有四百一十五部合一千九百一十九卷正光已後天下多虞王役尤甚於是所在編民相與入道假慕沙門實避調役猥濫之極自中國之有佛法未之有也略而計之僧尼大衆二百萬矣其寺三萬有餘流弊不歸一至於此識者所以歎息也道家之原出於老子其自言也先天地生以資萬類上處玉京為神王之宗下在紫微為飛仙之主千變萬化有德不德隨感應物厥迹無常授軒轅於峨嵋教帝嚳於牧德大禹聞長生之訣尹喜受道德之旨至於丹書紫字升玄飛步之經玉石金光妙有靈洞之説如此之文不可勝紀其為教也咸蠲去邪纍澡雪心神積行樹功纍德增善乃至白日升天長生世上所以秦皇漢武甘心不息靈帝置華蓋於濯龍設壇場而為禮及張陵受道於鵠鳴因傳天官章本千有二百弟子相授其事大行齋祠跪拜各成法道有三元九府百二十官一切諸神咸所統攝又稱劫數頗類佛經其延康龍漢赤明開皇之屬皆其名也及其劫終稱天地俱壞其書多有禁祕非其徒也不得輒觀至於化金銷玉行符敕水奇方妙術萬等千條上云羽化飛天次稱消災滅禍故好異者往往而尊事之初文帝入賓於晉從者務勿塵姿神奇偉登仙於伊闕之山寺識者咸云魏祚之將大太祖好老子之言誦詠不倦天興中儀曹郎董謐因獻服食仙經數十篇於是置仙人博士立仙坊煮鍊百藥封西山以供其薪蒸令死罪者試服之非其本心多死無驗太祖猶將修焉太醫周淡苦其煎採之役欲廢其事乃陰令妻貨仙人博士張曜妾得曜隱罪曜懼死因請辟穀太祖許之給曜資用為造靜堂於苑中給灑掃民二家而鍊藥之官仍為不息久之太祖意少懈乃止世祖時道士寇謙之字輔真南雍州刺史讚之弟自云寇恂之十三世孫早好仙道有絶俗之心少修張魯之術服食餌藥歷年無效幽誠上達有仙人成公興不知何許人至謙之從母家傭賃謙之嘗覲其姨見興形貌甚強力作不倦請回賃興代己使役乃將還令其開舍南辣田謙之樹下坐算興墾發致勤時來看算謙之謂曰汝但力作何為看此二三日後復來看之如此不已後謙之算七曜有所不了惘然自失興謂謙之曰先生何為不懌謙之曰我學算纍年而近算周髀不合以此自愧且非汝所知何勞問也興曰先生試隨興語布之俄然便決謙之歎伏不測興之深淺請師事之興固辭不肯但求為謙之弟子未幾謂謙之曰先生有意學道豈能與興隱遁謙之欣然從之興乃令謙之潔齋三日共入華山令謙之居一石室自出採藥還與謙之食藥不復飢乃將謙之入嵩山有三重石室令謙之住第二重歷年興謂謙之曰興出後當有人將藥來得但食之莫為疑怪尋有人將藥而至皆是毒蟲臭惡之物謙之大懼出走興還問狀謙之具對興歎息曰先生未便得仙政可為帝王師耳興事謙之七年而謂之曰興不得久留明日中應去興亡後先生幸為沐浴自當有人見迎興乃入第三重石室而卒謙之躬自沐浴明日中有叩石室者謙之出視見兩童子一持法服一持鉢及錫杖謙之引入至興尸所興欻然而起著衣持鉢執杖而去先是有京兆灞城人王胡兒其叔父亡頗有靈異曾將胡兒至嵩高別嶺同行觀望見金室玉堂有一館尤珍麗空而無人題曰成公興之館胡兒怪而問之其叔父曰此是仙人成公興館坐失火燒七間屋被謫為寇謙之作弟子七年始知謙之精誠遠通興乃仙者謫滿而去謙之守志嵩嶽精專不懈以神瑞二年十月乙卯忽遇大神乘雲駕龍導從百靈仙人玉女左右侍衛集止山頂稱太上老君謂謙之曰往辛亥年嵩嶽鎮靈集仙宮主表天曹稱自天師張陵去世已來地上曠誠修善之人無所師授嵩嶽道士上谷寇謙之立身直理行合自然才任軌範首處師位吾故來觀汝授汝天師之位賜汝雲中音誦新科之誡二十卷號曰並進言吾此經誡自天地開闢已來不傳於世今運數應出汝宣吾新科清整道教除去三張偽法租米錢稅及男女合氣之術大道清虛豈有斯事專以禮度為首而加之以服食閉練使王九疑人長客之等十二人授謙之服氣導引口訣之法遂得辟穀氣盛體輕顏色殊麗弟子十餘人皆得其術泰常八年十月戊戌有牧土上師李譜文來臨嵩嶽云老君之玄孫昔居代郡桑乾以漢武之世得道為牧土宮主領治三十六土人鬼之政地方十八萬里有奇蓋歷術一章之數也其中為方萬里者有三百六十方遣弟子宣教云嵩嶽所統廣漢平土方萬里以授謙之作誥曰吾處天宮敷演真法處汝道年二十二歲除十年為竟蒙其餘十二年教化雖無大功且有百授之勞今賜汝遷入內宮太真太寶九州真師治鬼師治民師繼天師四録修勤不懈依勞復遷賜汝天中三真太文録劾召百神以授弟子文録有五等一曰陰陽太官二曰正府真官三曰正房真官四曰宿宮散官五曰並進録主壇位禮拜衣冠儀式各有差品凡六十餘卷號曰録圖真經付汝奉持輔佐北方泰平真君出天宮靜輪之法能興造克就則起真仙矣又地上生民末劫垂及其中行教甚難但令男女立壇宇朝夕禮拜若家有嚴君功及上世其中能修身練藥學長生之術即為真君種民藥別授方銷練金丹雲英八石玉漿之法皆有決要上師李君手筆有數篇其餘皆正真書曹趙道覆所書古文鳥迹篆隸雜體辭義約辨婉而成章大自與世禮相準擇賢推德信者為先勤者次之又言二儀之間有三十六天中有三十六宮宮有一主最高者無極至尊次曰大至真尊次天覆地載陰陽真尊次洪正真尊姓趙名道隱以殷時得道牧土之師也牧土之來赤松王喬之倫及韓終張安世劉根張陵近世仙者並為翼從牧土命謙之為子與群仙結為徒友幽冥之事世所不了謙之具問一一告焉經云佛者昔於西胡得道在三十二天為延真宮主勇猛苦教故其弟子皆髠形染衣斷絶人道諸天衣服悉然始光初奉其書而獻之世祖乃令謙之止於張曜之所供其食物時朝野聞之若存若亡未全信也崔浩獨異其言因師事之受其法術於是上疏讚明其事曰臣聞聖王受命則有大應而河圖洛書皆寄言於蟲獸之文未若今日人神接對手筆粲然辭旨深妙自古無比昔漢高雖復英聖四皓猶或耻之不為屈節今清德隱仙不召自至斯誠陛下侔蹤軒黃應天之符也豈可以世俗常談而忽上靈之命臣竊懼之世祖欣然乃使謁者奉玉帛牲牢祭嵩嶽迎致其餘弟子在山中者於是崇奉天師顯揚新法宣布天下道業大行浩事天師拜禮甚謹人或譏之浩聞之曰昔張釋之為王生結襪吾雖才非賢哲今奉天師足以不愧於古人矣及嵩高道士四十餘人至遂起天師道場於京城之東南重壇五層遵其新經之制給道士百二十人衣食齊肅祈請六時禮拜月設厨會數千人世祖將討赫連昌太尉長孫嵩難之世祖乃問幽徵於謙之謙之對曰必克陛下神武應期天經下治當以兵定九州後文先武以成太平真君真君三年謙之奏曰今陛下以真君御世建靜輪天宮之法開古以來未之有也應登受符書以彰聖德世祖從之於是親至道壇受符録備法駕旗幟盡青以從道家之色也自後諸帝每即位皆如之恭宗見謙之奏造靜輪宮必令其高不聞雞鳴狗吠之聲欲上與天神交接功役萬計經年不成乃言於世祖曰人天道殊卑高定分今謙之欲要以無成之期説以不然之事財力費損百姓疲勞無乃不可乎必如其言未若因東山萬仞之上為功差易世祖深然恭宗之言但以崔浩贊成難違其意沉吟者久之乃曰吾亦知其無成事既爾何惜五三百功九年謙之卒葬以道士之禮先於未亡謂諸弟子曰及謙之在汝曹可求遷録吾去之後天宮真難就復遇設會之日更布二席於上師坐前弟子問其故謙之曰仙官來是夜卒前一日忽言吾氣息不接腹中大痛而行止如常至明旦便終須臾口中氣狀若煙雲上出窗中至天半乃消尸體引長弟子量之八尺三寸三日已後稍縮至斂量之長六寸於是諸弟子以為尸解變化而去不死也時有京兆人韋文秀隱於嵩高徵詣京師世祖曾問方士金丹事多曰可成文秀對曰神道幽昧變化難測可以暗遇難以豫期臣昔者受教於先師曾聞其事未之為也世祖以文秀關右豪族風操溫雅言對有方遣與尚書崔賾詣王屋山合丹竟不能就時方士至者前後數人河東祁纖好相人世祖賢之拜纖上大夫潁陽絳略聞喜吳劭道引養氣積年百餘歲神氣不衰恆農閻平仙博覽百家之言然不能達其意辭占應對義旨可聽世祖欲授之官終辭不受扶風魯祈遭赫連屈孑暴虐避地寒山教授弟子數百人好方術少嗜欲河東羅崇之常餌松脂不食五穀自稱受道於中條山世祖令崇還鄉里立壇祈請崇云條山有穴與昆崘蓬萊相屬入穴中得見仙人與之往來詔令河東郡給所須崇入穴行百餘步遂窮後召至有司以崇誣罔不道奏治之世祖曰崇修道之人豈至欺妄以詐於世或傳聞不審而至於此古之君子進人以禮退人以禮今治之是傷朕待賢之意遂赦之又有東萊人王道翼少有絶俗之志隱韓信山四十餘年斷粟食荽通達經章書符録常隱居深山不交世務年六十餘顯祖聞而召焉青州刺史韓頽遣使就山徵之翼乃赴都顯祖以其仍守本操遂令僧曹給衣食以終其身太和十五年秋詔曰夫至道無形虛寂為主自有漢以後置立壇祠先朝以其至順可歸用立寺宇昔京城之內居舍尚希今者里宅櫛比人神猥湊非所以祗崇至法清敬神道可移於都南桑乾之陰嶽山之陽永置其所給戶五十以供齋祀之用仍名為崇虛寺可召諸州隱士員滿九十人遷洛移鄴踵如故事其道壇在南郊方二百步以正月七日七月七日十月十五日壇主道士哥人一百六人以行拜祠之禮諸道士罕能精至又無才術可高武定六年有司執奏罷之其有道術如河東張遠遊河間趙靜通等齊文襄王別置館京師而禮接焉
