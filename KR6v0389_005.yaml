body:
  text: 經籍志大乘經六百一十七部二千七十六卷五百五十八部一千六百九十七卷經五十九部三百七十九卷疏小乘經四百八十七部八百五十二卷雜經三百八十部七百一十六卷雜經目殘缺甚見數如此雜疑經一百七十二部三百三十六卷大乘律五十二部九十一卷小乘律八十部四百七十二卷七十七部四百九十卷律二部二十三卷講疏雜律二十七部四十六卷大乘論三十五部一百四十一卷三十部九十四卷論十五部四十七卷疏小乘論四十一部五百六十七卷二十一部四百九十一卷論十部七十六卷講疏雜論五十一部四百三十七卷三十二部二百九十九卷論九部一百三十八卷講疏記二十部四百六十四卷右一千九百五十部六千一百九十八卷佛經者西域天竺之迦維衛國淨飯王太子釋迦牟尼所説釋迦當周莊王之九年四月八日自母右脅而生姿貌奇異有三十二相八十二好捨太子位出家學道勤行精進覺悟一切種智而謂之佛亦曰佛陀亦曰浮屠皆胡言也華言譯之為淨覺其所説云人身雖有生死之異至於精神則恆不滅此身之前則經無量身矣積而修習精神清淨則成佛道天地之外四維上下更有天地亦無終極然皆有成有敗一成一敗謂之一劫自此天地已前則有無量劫矣每劫必有諸佛得道出世教化其數不同今此劫中當有千佛自初至于釋迦已七佛矣其次當有彌勒出世必經三會演説法藏開度衆生由其道者有四等之果一曰須陀洹二曰斯陀含三曰阿那含四曰阿羅漢至羅漢者則出入生死去來隱顯而不為纍阿羅漢已上至菩薩者深見佛性以至成道每佛滅度遺法相傳有正象末三等淳醨之異年歲遠近亦各不同末法已後衆生愚鈍無復佛教而業行轉惡年壽漸短經數百千載間乃至朝生夕死然後有大水大火大風之災一切除去之而更立生人又歸淳朴謂之小劫每一小劫則一佛出世初天竺中多諸外道並事水火毒龍而善諸變幻釋迦之苦行也是諸邪道並來嬲惱以亂其心而不能得及佛道成盡皆摧伏並為弟子弟子男曰桑門譯言息心而總曰僧譯言行乞女曰比丘尼皆剃落鬚髮釋纍辭家相與和居治心修淨行乞以自資而防心攝行僧至二百五十戒尼五百戒俗人信憑佛法者男曰優婆塞女曰優婆夷皆去殺盜淫妄言飲酒是為五誡釋迦在世教化四十九年乃至天龍人鬼並來聽法弟子得道以百千萬億數然後於拘尸那城娑羅雙樹間以二月十五日入般涅槃涅槃亦曰泥洹譯言滅度亦言常樂我淨初釋迦説法以人之性識根業各差故有大乘小乘之説至是謝世弟子大迦葉與阿難等五百人追共撰述綴以文字集載為十二部後數百年有羅漢菩薩相繼著論贊明其義然佛所説我滅度後正法五百年像法一千年末法三千年其義如此推尋典籍自漢已上中國未傳或云久以流布遭秦之世所以堙滅其後張騫使西域蓋聞有浮屠之教哀帝時博士弟子秦景使伊存口授浮屠經中土聞之未之信也後漢明帝夜夢金人飛行殿庭以問於朝而傅毅以佛對帝遣郎中蔡愔及秦景使天竺求之得佛經四十二章及釋迦立像并與沙門攝摩騰竺法蘭東還愔之來也以白馬負經因立白馬寺於洛城雍門西以處之其經緘于蘭臺石室而又畫像於清涼臺及顯節陵上章帝時楚王英以崇敬佛法聞西域沙門齎佛經而至者甚衆永平中法蘭又譯十住經其餘傳譯多未能通至桓帝時有安息國沙門安靜齎經至洛翻譯最為通解靈帝時有月支沙門支讖天竺沙門竺佛朔等並翻佛經而支讖所譯泥洹經二卷學者以為大得本旨漢末太守竺融亦崇佛法三國時有西域沙門康僧會齎佛經至吳譯之吳主孫權甚大敬信魏黃初中中國人始依佛戒剃髮為僧先是西域沙門來此譯小品經首尾乖舛未能通解甘露中有朱仕行者往西域至于闐國得經九十章晉元康中至鄴譯之題曰放光般若經太始中有月支沙門竺法護西遊諸國大得佛經至洛翻譯部數甚多佛教東流自此而盛石勒時常山沙門衛道安性聰敏誦經日至萬餘言以胡僧所譯維摩法華未盡深旨精思十年心了神悟乃正其乖舛宣揚解釋時中國紛擾四方隔絶道安乃率門徒南遊新野欲令玄宗所在流布分遣弟子各趨諸方法性詣揚州法和入蜀道安與慧遠之襄陽後至長安苻堅甚敬之道安素聞天竺沙門鳩摩羅什思通法門勸堅致之什亦聞安令問遙拜致敬姚萇弘始二年羅什至長安時道安卒後已二十載矣什深慨恨什之來也大譯經論道安所正與什所譯義如一初無乖舛初晉元熙中新豐沙門智猛策杖西行到華氏城得泥洹經及僧祇律東至高昌譯泥洹為二十卷後有天竺沙門曇摩羅讖復齎胡本來至河西沮渠蒙遜遣使至高昌取猛本欲相參驗未還而蒙遜破滅姚萇弘始十年猛本始至長安譯為三十卷曇摩羅讖又譯金光明等經時胡僧至長安者數十輩惟鳩摩羅什才德最優其所譯則維摩法華成實論等諸經及曇無懺所譯金光明曇摩羅懺所譯泥洹等經並為大乘之學而什又譯十誦律天竺沙門佛陀耶舍譯長阿含經及四方律兜佉勒沙門曇摩難提譯增一阿含經曇摩耶舍譯阿毗曇論並為小乘之學其餘經論不可勝記自是佛法流通極於四海矣東晉隆安中又有𦋺賓沙門僧伽提婆譯增一阿含經及中阿含經義熙中沙門支法領從于闐國得華嚴經三萬六千偈至金陵宣譯又有沙門法顯自長安遊天竺經三十餘國隨有經律之處學其書語譯而寫之還至金陵與天竺禪師跋羅參共辨定謂僧祇律學者傳之齊梁及陳並有外國沙門然所宣譯無大名部可為法門者梁武大崇佛法於華林園中總集釋氏經典凡五千四百卷沙門寶唱撰經目録又後魏時太武帝西征長安以沙門多違佛律羣聚穢亂乃詔有司盡坑殺之焚破佛像長安僧徒一時殲滅自餘征鎮豫聞詔書亡匿得免者十一二文成之世又使修復熙平中遣沙門慧生使西域采諸經律得一百七十部永平中又有天竺沙門菩提留支大譯佛經與羅什相埒其地持十地論並為大乘學者所重後齊遷鄴佛法不改至周武帝時蜀郡沙門衛元嵩上書稱僧徒猥濫武帝出詔一切廢毀開皇元年高祖普詔天下任聽出家仍令計口出錢營造經像而京師及并州相州洛州等諸大都邑之處並官寫一切經置于寺內而又別寫藏于祕閣天下之人從風而靡競相景慕民間佛經多於六經數十百倍大業時又令沙門智果於東都內道場撰諸經目分別條貫以佛所説經為三部一曰大乘二曰小乘三曰雜經其餘似後人假託為之者別為一部謂之疑經又有菩薩及諸深解奧義贊明佛理者名之為論及戒律並有大小及中三部之別又所學者録其當時行事名之為記凡十一種今舉其大數列於此篇右道佛經二千三百二十九部七千四百一十四卷道佛者方外之教聖人之遠致也俗士為之不通其指多離以迂怪假託變幻亂於世斯所以為弊也故中庸之教是所罕言然亦不可誣也故録其大綱附于四部之末大凡經傳存亡及道佛六千五百二十部五萬六千八百八十一卷
