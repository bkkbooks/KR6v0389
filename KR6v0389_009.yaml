body:
  text: 列傳第二百十八西域二西番諸衛西寧河州洮州岷州等番族諸衛安定衛阿端衛曲先衛赤斤蒙古衛沙州衛罕東衛罕東左衛哈梅里西番即西羌族種最多自陝西歷四川雲南西徼外皆是其散處河湟洮岷間者為中國患尤劇漢趙充國張奐段熲唐哥舒翰宋王韶之所經營皆此地也元封駙馬章古為寧濮郡王鎮西寧於河州設吐番宣慰司以洮岷黎雅諸州隸之統治番眾洪武二年太祖定陝西即遣官齎詔招諭其酋長皆觀望復遣員外郎許允德招之乃多聽命明年五月吐蕃宣慰使何鎖南普等以元所授金銀牌印宣敕來上一會鄧愈克河州遂詣軍前降其鎮西武靖王卜納剌亦以吐蕃諸部來納款冬何鎖南普等入朝貢馬及方物帝喜賜襲衣四年正月設河州衛命為指揮同知予世襲知院朵兒只汪家奴並為指揮僉事設千戶所八百戶所七皆命其酋長為之卜納剌等亦至京師為靖南衛指揮同知二其儕桑加朵兒只為高昌衛指揮同知皆帶刀侍衛自是番酋日至尋以降人馬梅汪瓦兒並為河州衛指揮僉事又遣西寧州同知李喃哥等招撫其酋長至者亦悉授官乃改西寧州為衛以喃哥為指揮帝以西番產馬與之互市馬至漸多而其所用之貨與中國異自更鈔法後馬至者少患之八年五月命中官趙成齎羅綺綾絹并巴茶往河州市之馬稍集率厚其值以償成又宣諭德意番人感悅相率詣闕謝恩山後歸德等州西番諸部落皆以馬來市十二年洮州十八族番酋三副使等叛據納麟七站之地命征西將軍沐英等討之又命李文忠往籌軍事英等至洮州舊城寇遁去追斬其魁數人盡獲畜產遂於東籠山南川度地築城置戍遣使來奏帝報曰洮州西番門戶築城戍守扼其咽喉遂置洮州衛以指揮聶緯陳暉等六人守之已文忠等言官軍守洮州餉艱民勞帝降敕諭之曰洮州西控番戎東蔽湟隴漢唐以來備邊要地今番寇既斥棄之不守數年後番人將復為患慮小費而忘大虞豈良策哉所獲牛羊分給將士亦足充兩年軍食其如敕行之文忠等乃不敢違秋何鎖南普及鎮撫劉溫各攜家屬來朝諭中書省臣曰何鎖南普自歸附以來信義甚堅前遣使烏斯藏遠涉萬里及歸所言皆稱朕意今以家屬來朝宜加禮待乃賜米麥各三十石劉溫三之一英等進擊番寇大破之盡擒其魁俘斬數萬人獲馬牛羊數十萬自是羣番震慴不敢為寇十六年青海酋長史剌巴等七人來歸賜文綺寶鈔時岷州亦設衛番人歲以馬易茶馬日蕃息二十五年又命中官而聶至河州召必里諸番族以敕諭之爭出馬以獻得萬三百餘匹給茶三十餘萬觔命以馬畀河南山東陝西騎士帝以諸衛將士有擅索番人馬者遣官齎金銅信符敕諭往賜涼州甘州肅州永昌山丹臨洮鞏昌西寧洮州河州岷州諸番族諭之曰往者朝廷有所需必酬以茶貨未許私徵近聞邊將無狀多假朝命擾害俾爾等不獲寧居今特製金銅信符頒給遇有徵發必比對相符始行否則偽械至京罪之自是需求遂絕初西寧番僧三剌為書招降罕東諸部又建佛剎於碾白南川以居其眾至是來朝貢馬請敕護持賜寺額帝從所請賜額曰瞿曇寺立西寧僧綱司以三剌為都綱司又立河州番漢二僧綱司並以番僧為之紀以符契自是其徒爭建寺帝輒錫以嘉名且賜敕護持番僧來者日眾永樂時諸衛僧戒行精勤者多授剌麻禪師灌頂國師之號有加至大國師西天佛子者悉給以印誥許之世襲且令歲一朝貢由是諸僧及諸衛土官輻輳京師其他族種如西寧十三族岷州十八族洮州十八族之屬大者數千人少者數百亦許歲一奉貢優以宴賚西番之勢益分其力益弱西陲之患亦益寡宣德元年以協討安定曲先功加國師吒思巴領占等五人為大國師給誥命銀印秩正四品加剌麻著星等六人為禪師給敕命銀印秩正六品正統五年敕陝西鎮守都督鄭銘都御史陳鎰曰得奏言河州番民領占等先因避罪逃居結河里招集徒黨占耕土田不注籍納賦又藏匿逃亡剽劫行旅欲發兵討之朕念番性頑梗且所犯在赦前若遽加師旅恐累及無辜宜使人撫諭令散遣徒黨還所掠牛羊兵即勿進否則加兵未晚爾等其審之番人果輸服七年再敕銘及都御史王翱等曰得鎮守河州都指揮劉永奏往歲阿爾官等六族三千餘人列營歸德城下聲言交易後乃鈔掠屯軍大肆焚戮而著亦匝族番人屢於煖泉亭諸處潛為寇盜指揮張瑀擒獲二人止責償所盜馬縱之使去論法瑀及永皆當究治今姑令戴罪爾等即遣官偕三司堂上親詣其寨曉以利害令還歸所掠許其自新不悛則進討蓋馭戎之道撫綏為先撫之不從然後用兵爾等宜體此意番人亦輸服成化三年陝西副使鄭安言進貢番僧自烏斯藏來者不過三之一餘皆洮岷寺僧詭名冒貢進一羸馬輒獲厚直得所賜幣帛製為戰袍以拒官軍本以羈縻之而益致寇掠是虛國帑而齎盜糧也章下禮部三會廷臣議請行陝西文武諸臣計定貢期人數及存留起送之額以聞報可已而奏上諸自烏斯藏來者皆由四川入不得徑赴洮岷遂著為例明年冬洮州番寇擁眾掠鐵城後川二寨指揮張翰等率兵禦之敗去獲所掠人口以歸五年巡按江孟綸言四岷州番寇縱橫村堡為虛頃令指揮后泰與其弟通反覆開示五生番忍藏占藏等三十餘族酋長百六十餘人熟番栗林等二十四族酋長九十一人轉相告語悔過來歸且還被掠人畜願供徭賦殺牛告天誓不再犯已令副使李𤣱從宜賞勞宣示朝廷恩威皆歡躍而去惟熟番綠園一族怙惡不服兵部言番性無常朝撫夕叛未可弛備請諭邊臣向化者加意撫綏犯順者克期剿滅帝納其言八年禮官言洮岷諸衛送各族番人赴京多至四千二百餘人應賞綵幣人二表裏帛如之鈔二十九萬八千有奇馬直尚在其外考正統天順間各番貢使不過三五百人成化初因洮岷諸處濫以熟番作生番冒送已定例生番三年一貢大族四五人小族一二人赴京餘悉遣還成化六年副使鄧本瑞妄自招徠又復冒送臣部已重申約束今副使吳𤣱等不能嚴飭武備專事通番以紓近患乞降敕切責務遵前令帝亦如其言西寧即古湟中其西四百里有青海又曰西海水草豐美番人環居之專務畜牧日益繁滋素號樂土正德四年蒙古部酋亦不剌阿爾禿廝獲罪其主擁眾西奔瞰知青海饒富襲而據之大肆焚掠番人失其地多遠徙其留者不能自存反為所役屬自是甘肅西寧始有海寇之患九年總制彭澤集諸道軍將擣其巢寇詗知之由河州渡黃河奔四川出松潘茂州境直走烏斯藏及大軍引還則仍返海上惟阿爾禿廝遁去嘉靖二年尚書金獻民西征議遣官招撫許為藩臣如先朝設安定曲先諸衛故事兵部行總制楊一清計度一清意在征討言寇精騎不過二三千餘皆脇從番人然怨之入骨時欲報讐可用為間諜大舉剿絕議未定王憲王瓊相繼來代皆以兵寡餉詘議竟不行八年洮岷諸番數犯臨洮鞏昌內地騷動樞臣李承勳言番為海寇所侵日益內徙倘二寇交通何以善後昔趙充國不戰而服羌段熲殺羌百萬而內地虛耗兩者相去遠矣乞廣先帝之明專充國之任制置方略悉聽瓊便宜從事瓊乃集眾議且剿且撫先遣總兵官劉文遊擊彭椷分布士馬明年二月自固原進至洮岷遣人開示禍福洮州東路木舍等三十一族西路答祿失等十三族岷州西寧溝等十五族皆聽撫給白旂犒賜遣歸惟岷州東路若籠族西路板爾等十五族及岷州剌即等五族恃險不服乃分兵先攻若籠板爾二族覆其巢剌即諸族震慴乞降凡斬首三百六十餘級撫定七十餘族乃班師自是洮岷獲寧而西寧仍苦寇患十一年甘肅巡撫趙載等言亦不剌據海上已二十餘年其黨卜兒孩獨傾心向化求帖木哥等屬番來納款宜因而撫之或俾之納馬或令其遣質或授官給印建立衛所為我藩籬於計為便疏甫上會河套酋吉囊引眾西掠大破亦不剌營收其部落大半而去惟卜兒孩一枝斂眾自保由是西寧亦獲休息而納款之議竟寢及唐龍為總制寇南掠松潘龍慮其回巢與諸番及他部勾結為患奏行甘肅守臣繕兵積粟為殄滅計及龍去事亦不行二十年正月卜兒孩獻金牌良馬求款兵部言寇果輸誠通貢誠西陲大利乃止獻馬及金牌未有如往歲遣子入侍酋長入朝之請未可遽許宜令督撫臣偵察情實並條制馭之策以聞報可會寇勢漸衰番人亦漸復業其議復寢二十四年設岷州隸鞏昌府岷西臨極邊番漢雜處洪武時改土番十六族為十六里設衛治之俾稍供徭役自設州之後徵發繁重人日困敝且番人戀世官而流官又不樂居遙寄治他所越十餘年督撫合疏言不便乃設衛如故時北部俺答猖獗歲掠宣大諸鎮又羨青海富饒三十八年攜子賓兔丙兔等數萬眾襲據其地卜兒孩竄走遂縱掠諸番已引去留賓兔據松山丙兔據青海西寧亦被其患隆慶中俺答受封順義王修貢惟謹二子亦斂戢時烏斯藏僧有稱活佛者諸部多奉其教丙兔乃以焚修為名請建寺青海及嘉峪關外為久居計廷臣多言不可許禮官言彼已採木興工而令改建於他所勢所不能莫若因而許之以鼓其善心而杜其關外之請況中國之禦戎惟在邊關之有備戎之順逆亦不在一寺之遠近帝許之丙兔既得請又近脅番人使通道松潘以迎活佛四川守臣懼逼乞令俺答約束其子毋擾鄰境俺答言丙兔止因甘肅不許開市寧夏又道遠艱難雖有禁令不能盡制宣大總督方逢時亦言開市為便帝以責陝西督撫督撫不敢違萬曆二年冬許丙兔市於甘肅賓兔市於莊浪歲一次既而寺成賜額仰華先是亦不剌之據青海邊臣猶以外寇視之至是以俺答故竟視若屬番諸酋亦以父受王封不敢大為邊患而洮州之變乃起初洮州番人以河州奸民負其物貨入掠內地他族亦乘機為亂奸民以告河州參將陳堂堂曰此洮州番也何與我事洮州參將劉世英曰彼犯河州非我失事由是二將有隙總督石茂華聞之令二人及蘭州參將徐勳岷州守備朱憲舊洮州守備史經各引兵壓其境曉以利害番人懼即還所掠人畜世英謂首惡未擒不可遽已遂剿破之殺傷及焚死者無算軍律吹銅角乃退兵堂挾前憾不待角聲而去諸部亦多引去憲經方深入搜捕鄰番見其勢孤圍而殺之事聞帝震怒褫堂世英職切責茂華等茂華乃集諸軍分道進討斬首百四十餘級焚死者九百餘人獲孳畜數十羣諸番震恐遠徙來降者七十一族斬送首惡四人生縛以獻者二人輸馬牛羊二百六十稽首謝罪誓不再犯師乃還自丙兔據青海有切盡台吉者河套酋吉能從子俺答從孫也從之而西屢掠番人不得志邀俺答往助俺答雅欲侵瓦剌乃假迎活佛名擁眾西行疏請授丙兔都督賜金印且開茶市部議不許但稍給以茶俺答既抵瓦剌戰敗而還乃移書甘肅守臣乞假道赴烏斯藏守臣不能拒遂越甘肅而南會諸酋於海上番人益遭蹂躪多竄徙八年春始以活佛言東還而切盡弟火落赤及俺答庶兄子永邵卜遂留居青海不去八月丙兔率眾掠番並內地人畜詔絕其市賞俺答聞之馳書切責乃盡還所掠執獻為惡者六人自罰牛羊七百帝嘉其父恭順賚之銀幣即以牛羊賜其部人為惡者付之自治仍許貢市俺答益感德而火落赤侵掠番族不休守臣檄切盡台吉約束之亦引罪輸服及俺答卒傳至孫扯力克勢輕不能制諸酋
