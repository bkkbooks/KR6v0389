body:
  text: 列傳第二百十九西域三烏斯藏大寶法王大乘法王大慈法王闡化王贊善王護教王闡教王輔教王西天阿難功德國西天尼八剌國烏斯藏在雲南西徼外去雲南麗江府千餘里四川馬湖府千五百餘里陝西西寧衛五千餘里其地多僧無城郭羣居大土臺上不食肉娶妻無刑罰亦無兵革鮮疾病佛書甚多楞伽經至萬卷其土臺外僧有食肉娶妻者元世祖尊八思巴為大寶法王錫玉印既沒賜號皇天之下一人之上宣文輔治大聖至德普覺真智佐國如意大寶法王西天佛子大元帝師自是其徒嗣者咸稱帝師洪武初太祖懲唐世吐蕃之亂思制御之惟因其俗尚用僧徒化導為善乃遣使廣行招諭又遣陝西行省員外郎許允德使其地令舉元故官赴京授職於是烏斯藏攝帝師喃加巴藏卜先遣使朝貢五年十二月至京帝喜賜紅綺禪衣及鞋帽錢物明年二月躬自入朝上所舉故官六十人帝悉授以職改攝帝師為熾盛佛寶國師仍錫玉印及綵幣表裏各二十玉人製印成帝視玉未美令更製其崇敬如此暨辭還命河州衛遣官齎敕偕行招諭諸番之未附者冬元帝師之後鎖南堅巴藏卜一元國公哥列思監藏巴藏卜並遣使乞玉印廷臣言已嘗給賜不宜復豫乃以文綺賜之七年夏佛寶國師遣其徒來貢秋元帝師八思巴之後公哥監藏巴藏卜及烏斯藏僧答力麻八剌遣使來朝請封號詔授帝師後人為圓智妙覺弘教大國師烏斯藏僧為灌頂國師並賜玉印佛寶國師復遣其徒來貢上所舉土官五十八人亦皆授職九年答力麻八剌遣使來貢十一年復貢奏舉故官十六人為宣慰招討等官亦皆報允十四年復貢其時喃加巴藏卜已卒有僧哈立麻者國人以其有道術稱之為尚師成祖為燕王時知其名永樂元年命司禮少監侯顯僧智光齎書幣往徵其僧先遣人來貢而躬隨使者入朝四年冬將至命駙馬都尉沐昕往迎之既至帝延見於奉天殿明日宴華蓋殿賜黃金百白金千鈔二萬綵幣四十五表裏法器裀褥鞍馬香果茶米諸物畢備其從者亦有賜明年春賜儀仗銀瓜牙仗骨朵魫燈紗燈香合拂子各二手爐六傘蓋一銀交椅銀足踏銀杌銀盆銀罐青圓扇紅圓扇拜褥帳幄各一幡幢四十有八鞍馬二散馬四帝將薦福於高帝后命建普度大齊於靈谷寺七日帝躬自行香於是卿雲甘露青鳥白象之屬連日畢見帝大悅侍臣多獻賦頌事竣復賜黃金百白金千寶鈔二千綵幣表裏百二十馬九其徒灌頂圓通善慧大國師答師巴囉葛羅思等二亦加優賜遂封哈立麻為萬行具足十方最勝圓覺妙智慧善普應佑國演教如來大寶法王西天大善自在佛領天下釋教賜印誥及金銀鈔綵幣織金珠袈裟金銀器鞍馬命其徒孛隆逋瓦桑兒加領真為灌頂圓修淨慧大國師高日瓦禪伯為灌頂通悟弘濟大國師果欒羅葛羅監藏巴里藏卜為灌頂弘智淨戒大國師並賜印誥銀鈔綵幣已命哈立麻赴五臺山建大齊再為高帝后薦福賜豫優厚六年四月辭歸復賜金幣佛像命中官護行自是迄正統末入貢者八已法王卒久不奉貢弘治八年王葛哩麻巴始遣使來貢十二年兩貢禮官以一歲再貢非制請裁其賜賚從之正德元年來貢十年復來貢時帝惑近習言謂烏斯藏僧有能知三生者國人稱之為活佛欣然欲見之考永宣間陳誠侯顯入番故事命中官劉允乘傳往迎閣臣梁儲等言西番之教邪妄不經我祖宗朝雖嘗遣使蓋因天下初定藉以化導愚頑鎮撫荒服非信其教而崇奉之也承平之後纍朝列聖止因其來朝而賞賚之未嘗輕辱命使遠涉其地今忽遣近侍往送幢幡朝野聞之莫不駭愕而允奏乞鹽引至數萬動撥馬船至百艘又許其便宜處置錢物勢必攜帶私鹽騷擾郵傳為官民患今蜀中大盜初平瘡痍未起在官已無餘積必至苛斂軍民鋌而走險盜將復發況自天全六番出境涉數萬之程歷數歲之久道途絶無郵置人馬安從供頓脫中途遇寇何以禦之虧中國之體納外番之侮無一可者所齎敕書臣等不敢撰擬帝不聽禮部尚書毛紀六科給事中葉相十三道御史周倫等並切諫亦不聽允行以珠琲為幢幡黃金為供具賜其僧金印犒賞以巨萬計內庫黃金為之罄盡敕允往返以十年為期所攜茶鹽以數十萬計允至臨清漕艘為之阻滯入峽江舟大難進易以𦩷𦪇相連二百餘里及抵成都日支官廩百石蔬菜銀百兩錦官驛不足取傍近數十驛供之治入番器物估直二十萬守臣力爭減至十三萬工人雜造夜以繼日居歲餘始率將校十人士千人以行越兩月入其地所謂活佛者恐中國誘害之匿不出見將士怒欲脅以威番人夜襲之奪寶貨器械以去將校死者二人卒數百人傷者半之允乘善馬疾走僅免返成都戒部下弗言而以空函馳奏至則武宗已崩世宗召允還下吏治罪嘉靖中法王猶數入貢迄神宗朝不絶時有僧鎖南堅錯者能知已往未來事稱活佛順義王俺答亦崇信之萬曆七年以迎活佛為名西侵瓦剌為所敗此僧戒以好殺勸之東還俺答亦勸此僧通中國乃自甘州遺書張居正自稱釋迦摩尼比丘求通貢饋以儀物居正不敢受聞之於帝帝命受之而許其貢由是中國亦知有活佛此僧有異術能服人諸番莫不從其教即大寶法王及闡化諸王亦皆俯首稱弟子自是西方止知奉此僧諸番王徒擁虛位不復能施其號令矣大乘法王者烏斯藏僧昆澤思巴也其徒亦稱為尚師永樂時成祖既封哈立麻又聞昆澤思巴有道術命中官齎璽書銀幣徵之其僧先遣人貢舍利佛像遂偕使者入朝十一年二月至京帝即延見賜藏經銀鈔綵幣鞍馬茶果諸物封為萬行圓融妙法最勝真如慧智弘慈廣濟護國演教正覺大乘法王西天上善金剛普應大光明佛領天下釋教賜印誥袈裟幡幢鞍馬傘器諸物禮之亞於大寶法王明年辭歸賜加於前命中官護行後數入貢帝亦先後命中官喬來喜楊三保齎賜佛像法器袈裟禪衣絨錦綵幣諸物洪熙宣德間並來貢成化四年其王完卜遣使來貢禮官言無法王印文且從洮州入非制宜減其賜物使者言所居去烏斯藏二十餘程涉五年方達京師且所進馬多乞給全賜乃命量增十七年來貢弘治元年其王桑加瓦遣使來貢故事法王卒其徒自相繼承不由朝命三年輔教王遣使奉貢奏舉大乘法王襲職帝但納其貢賜賚遣還不命襲職正德五年遣其徒綽吉我些兒等從河州衛入貢禮官以其非貢道請減其賞並治指揮徐經罪從之已綽吉我些兒有寵於帝亦封大德法王十年僧完卜鎖南堅參巴爾藏卜遣使來貢乞襲大乘法王禮官失於稽考竟許之嘉靖十五年偕輔教闡教諸王來貢使者至四千餘人帝以人數踰額減其賞并治四川三司官濫送之罪初成祖封闡化等五王各有分地惟二法王以遊僧不常厥居故其貢期不在三年之列然終明世奉貢不絶云大慈法王名釋迦也失亦烏斯藏僧稱為尚師者也永樂中既封二法王其徒爭欲見天子邀恩寵於是來者趾相接釋迦也失亦以十二年入朝禮亞大乘法王明年命為妙覺圓通慈慧普應輔國顯教灌頂弘善西天佛子大國師賜之印誥十四年辭歸賜佛經佛像法仗僧衣綺帛金銀器且御製贊詞賜之共徒益以為榮明年遣使來貢十七年命中官楊三保齎佛像衣幣往賜二十一年復來貢宣德九年入朝帝留之京師命成國公朱勇禮部尚書胡濙持節冊封為萬行妙明真如上勝清淨般若弘照普慧輔國顯教至善大慈法王西天正覺如來自在大圓通佛宣宗崩英宗嗣位禮官先奏汰番僧六百九十人正統元年復以為請命大慈法王及西天佛子如故餘遣還不願者減酒饌廩餼自是輦下稍清西天佛子者能仁寺僧智光也本山東慶雲人洪武永樂中數奉使西國成祖賜號國師仁宗加號圓融妙慧淨覺弘濟輔國光範演教灌頂廣善大國師賜金印冠服金銀器至是復加西天佛子初太祖招徠番僧本藉以化愚俗弭邊患授國師大國師者不過四五人至成祖兼崇其教自闡化等五王及二法王外授西天佛子者二灌頂大國師者九灌頂國師者十有八其他禪師僧官不可悉數其徒交錯於道外擾郵傳內耗大官公私騷然帝不恤也然至者猶即遣還及宣宗時則久留京師耗費益甚英宗初年雖多遣斥其後加封號者亦不少景泰中封番僧沙加為弘慈大善法王班卓兒藏卜為灌頂大國師英宗復辟務反景帝之政降法王為大國師大國師為國師成化初憲宗復好番僧至者日衆劄巴堅參劄實巴領占竹等以祕密教得幸並封法王其次為西天佛子他授大國師國師禪師者不可勝紀四方奸民投為弟子輒得食大官每歲耗費巨萬廷臣屢以為言悉拒不聽孝宗踐阼清汰番僧法王佛子以下皆遞降驅還本土奪其印誥由是輦下復清弘治六年帝惑近習言命取領占竹等詣京言官交章力諫事乃寢十三年命為故西天佛子著癿領占建塔工部尚書徐貫等言此僧無益於國營墓足矣不當建塔不從尋命那卜堅參三人為灌頂大國師帝崩禮官請黜異教三人並降禪師既而武宗蠱惑佞幸復取領占竹至京命為灌頂大國師以先所降禪師三人為國師帝好習番語引入豹房由是番僧復盛封那卜堅參及劄巴藏卜為法王那卜領占及綽即羅竹為西天佛子已封領占班丹為大慶法王給番僧度牒三千聽其自度或言大慶法王即帝自號也綽吉我些兒者烏斯藏使臣留豹房有寵封大德法王乞令其徒二人為正副使還居本土如大乘法王例入貢且為二人請國師誥命入番設茶禮官劉春等執不可帝不聽春等復言烏斯藏遠在西方性極頑獷雖設四王撫化而其來貢必為節制若令齎茶以往賜之誥命彼或假上旨以誘諸番妄有所干請從之則非法不從則生釁害不可勝言帝乃罷設茶敕而豫之誥命帝時益好異教常服其服誦習其經演法內廠綽吉我些兒輩出入豹房與權幸雜處氣焰灼然及二人乘傳歸所過驛騷公私咸被其患世宗立復汰番僧法王以下悉被斥後世宗崇道教益黜浮屠自是番僧鮮至中國者闡化王者烏斯藏僧也初洪武五年河州衛言烏斯藏怕木竹巴之地有僧曰章陽沙加監藏元時封灌頂國師為番人推服今朵甘酋賞竹監藏與管兀兒搆兵若遣此僧撫諭朵甘必內附帝如其言仍封灌頂國師遣使賜玉印綵幣明年其僧使酋長鎖南藏卜貢佛像佛書舍利是時方命佛寶國師招諭番人於是怕木竹巴僧等自稱輦卜闍遣使進表及方物帝厚賜之輦卜闍者其地首僧之稱也八年正月設怕木竹巴萬戶府以番酋為之已而章陽沙加卒授其徒鎖南扎思巴噫監藏卜為灌頂國師二十一年上表稱病舉弟吉剌思巴監藏巴藏卜自代遂授灌頂國師自是三年一貢成祖嗣位遣僧智光往賜永樂元年遣使入貢四年封為灌頂國師闡化王賜螭紐玉印白金五百兩綺衣三襲錦帛五十匹巴茶二百斤明年命與護教贊善二王必力工瓦國師及必里朵甘隴答諸衛川藏諸族復置驛站通道往來十一年中官楊三保使烏斯藏還其王遣從子劄結等隨之入貢明年復命三保使其地令與闡教護教贊善三王及川卜川藏等共修驛站諸未復者盡復之自是道路畢通使臣往還數萬里無虞寇盜矣其後貢益頻數帝嘉其誠復命三保齎佛像法器袈裟禪衣及絨錦綵幣往勞之已又命中官戴興往賜綵幣宣德二年命中官侯顯往賜絨錦綵幣其貢使嘗毆殺驛官子帝以其無知遣還敕王戒飭而已九年貢使歸以賜物易茶至臨洮有司沒入之羈其使請命詔釋之還其茶正統五年王卒遣禪師二人為正副使封其從子吉剌思巴永耐監藏巴藏卜為闡化王使臣私市茶綵數萬令有司運致禮官請禁之帝念其遠人但令自僦舟車已王卒以桑兒結堅咱巴藏卜嗣成化元年禮部言宣正間諸貢不過三四十人景泰時十倍天順間百倍今貢使方至乞敕諭闡化王令如洪武舊制三年一貢從之五年王卒命其子公葛列思巴中奈領占堅參巴兒藏卜嗣遣僧進貢還至西寧留寺中不去又冒名入貢隱匿所賜璽書幣物王使其下三人來趣其僧閉之室中剜二人目一人逸訴於都指揮孫鑑鑑捕置之獄受其徒賄而復以聞下四川巡按鞫治坐僧四人死鑑將逮治會赦悉免十七年以長河西諸番多假番王名朝貢命給闡化贊善闡教輔教四王敕書勘合以防奸僞二十二年遣使四百六十人來貢三守臣遵新例但納一百五十人禮官以使者已入境難固拒請順其情概納之為後日兩貢之數從之弘治八年遣僧來貢還至揚州廣陵驛遇大乘法王貢使相與殺牲縱酒三日不去見他使舟至則以石投之不容近陸知府唐愷詣驛呼其舟子戒之諸僧持兵仗呼譟擁而入愷走避隸卒力格鬬乃免為所傷者甚衆事聞命治通事及伴送者罪遣人諭王令自治其使者其時王卒子班阿吉江東劄巴請襲命番僧二人為正副使往封比至新王亦死其子阿往劄失劄巴堅參即欲受封二人不得已授之遂具謝恩儀物並獻其父所領勘合印章為左驗至四川守臣劾其擅封逮治論斬減死戍邊副使以下悉宥正德三年禮官以貢使踰額令為後年應貢之數嘉靖三年偕輔教王及大小三十六番請入貢禮官以諸番不具地名族氏令守臣核實以聞四十二年四闡化諸王遣使入貢請封禮官循故事遣番僧二十二人為正副使序班朱廷對監之至中途大騷擾不受廷對約束廷對還白其狀禮官請自後封番王即以誥敕付使者齎還或下守臣擇近邊僧人齎賜封諸藏之不遣京寺番僧自此始也番人素以入貢為利雖屢申約束而來者日增隆慶三年再定令闡化闡教輔教三王俱三歲一貢貢使各千人半全賞半減賞全賞者遣八人赴京餘留邊上遂為定例萬曆七年貢使言闡化王長子札釋藏卜乞嗣職如其請久之卒其子請襲神宗許之而制書但稱闡化王用閣臣沈一貫言加稱烏斯藏怕木竹巴灌頂國師闡化王其後奉貢不替所貢物有畫佛銅佛銅塔珊瑚犀角氆氌左髻毛纓足力麻鐵力麻刀劍明甲胄之屬諸王所貢亦如之贊善王者靈藏僧也其地在四川徼外視烏斯藏為近成祖踐阼命僧智光往使永樂四年其僧著思巴兒監藏遣使入貢命為灌頂國師明年封贊善王國師如故賜金印誥命十七年中官楊三保往使洪熙元年王卒從子喃葛監藏襲宣德二年中官侯顯往使正統五年奏稱年老請以長子班丹監銼代帝不從其請而授其子為都指揮使初入貢無定期自永樂迄正統或間歲一來或一歲再至而歷朝遣使往賜者金幣寶鈔佛像法器袈裟禪服不一而足至成化元年始定三歲一貢之例三年命塔兒把堅粲襲封故事封番王誥敕及幣帛遣官齎賜至是西陲多事禮官乞付使者齎回從之五年四川都司言贊善諸王不遵定制遣使率各寺番僧百三十二種入貢且無番王印文今止留十餘人守貢物餘已遣還禮官言番地廣遠番王亦多若遵例並時入貢則內郡疲供億莫若令諸王於應貢之歲各具印文取次而來今貢使已至難拂其情乞許作明年應貢之數報可十八年禮官言番王三歲一貢貢使百五十人定制也近贊善王連貢者再已遣四百十三人今請封請襲又遣千五百五十人違制宜却乞許其請封襲者以三百人為後來兩貢之數餘悉遣還亦報可遂封喃葛堅粲巴藏卜為贊善王弘治十六年卒命其弟端竹堅咱嗣嘉靖後猶入貢如制護教王者名宗巴幹即南哥巴藏卜館覺僧也成祖初僧智光使其地永樂四年遣使入貢詔授灌頂國師賜之誥明年遣使入謝封為護教王賜金印誥命國師如故遂頻歲入貢十二年卒命其從子幹些兒吉剌思巴藏卜嗣洪熙宣德中並入貢已而卒無嗣其爵遂絶闡教王者必力工瓦僧也成祖初僧智光齎敕入番其國師端竹監藏遣使入貢永樂元年至京帝喜宴賚遣還四年又貢帝優賜並賜其國師大板的達律師鎖南藏卜衣幣十一年乃加號灌頂慈慧淨戒大國師又封其僧領真巴兒吉監藏為闡教王賜印誥綵幣後比年一貢楊三保戴興侯顯之使皆齎金幣佛像法器賜焉宣德五年王卒命其子綽兒加監巴領占嗣久之卒命其子領占叭兒結堅參嗣成化四年從禮官言申三歲一貢之制明年王卒命其子領占堅參叭兒藏卜襲二十年帝遣番僧班著兒齎璽書勘合往賜其僧憚行至半道僞為王印信番文復命詔逮治正德十三年遣番僧領占劄巴等封其新王劄巴等乞馬快船三十艘載食鹽為入番買路之資戶科戶部並疏爭不聽劄巴等在途科索無厭至呂梁毆管洪主事李瑜幾斃恣橫如此迄嘉靖世闡教王修貢不輟輔教王者思達藏僧也其地視烏斯藏尤遠成祖即位命僧智光持詔招諭賜以銀幣永樂十一年封其僧南渴烈思巴為輔教王賜誥印綵幣數通貢使楊三保侯顯皆往賜其國與諸法王等景泰七年使來貢自陳年老乞令其子喃葛堅粲巴藏卜代帝從之封為輔教王賜誥敕金印綵幣袈裟法器以灌頂國師葛藏右覺義桑加巴充正副使往封至四川多雇牛馬任載私物禮官請治其罪英宗方復辟命收其敕書減供應之半成化五年王卒命其子喃葛劄失堅參叭藏卜嗣六年申舊制三年一貢多不過百五十人由四川雅州入國師以下不許貢弘治十二年輔教等四王及長河西宣慰司並時入貢使者至二千八百餘人禮官以供費不資請敕四川守臣遵制遣送違者却還從之歷正德嘉靖世奉貢不絶西天阿難功德國西方番國也洪武七年王卜哈魯遣其講主必尼西來朝貢方物及解毒藥石詔賜文綺禪衣及布帛諸物後不復至又有和林國師朵兒只怯烈失思巴藏卜亦遣其講主汝奴汪叔來朝獻銅佛舍利白哈丹布及元所授玉印一玉圖書一銀印四銅印五金字牌三命宴賚遣還明年國師入朝又獻佛像舍利馬二匹賜文綺禪衣和林即元太祖故都在極北非西番其國師則番僧與功德國同時來貢後亦不復至尼八剌國在諸藏之西去中國絶遠其王皆僧為之洪武十七年太祖命僧智光齎璽書綵幣往并使其鄰境地湧塔國智光精釋典負才辨宣揚天子德意其王馬達納羅摩遣使隨入朝貢金塔佛經及名馬方物二十年達京師帝喜賜銀印玉圖書誥敕符驗及幡幢綵幣二十三年再貢加賜玉圖書紅羅傘終太祖時數歲一貢成祖復命智光使其國永樂七年遣使來貢十一年命楊三保齎璽書銀幣賜其嗣王沙的新葛及地湧塔王可般五明年遣使來貢封沙的新葛為尼八剌國王賜誥及鍍金銀印十六年遣使來貢命中官鄧誠齎璽書錦綺紗羅往報之所經罕東靈藏必力工瓦烏斯藏及野藍卜納皆有賜宣德二年又遣中官侯顯賜其王絨錦紵絲地湧塔王如之自後貢使不復至
